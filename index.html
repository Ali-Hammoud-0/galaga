<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Galaga Clone</title>

<!--
  ╔══════════════════════════════════════════════════════════╗
  ║              GALAGA CLONE — README                       ║
  ╠══════════════════════════════════════════════════════════╣
  ║                                                          ║
  ║  AUDIO FILES:                                            ║
  ║  Place .wav files in a "sounds/" folder next to this     ║
  ║  file. Expected filenames (configurable in CONFIG.audio): ║
  ║    - sounds/shoot.wav       (player fires)               ║
  ║    - sounds/hit.wav         (enemy hit)                  ║
  ║    - sounds/explosion.wav   (enemy destroyed)            ║
  ║    - sounds/levelup.wav     (wave cleared)               ║
  ║    - sounds/gameover.wav    (game over)                  ║
  ║    - sounds/dive.wav        (enemy begins diving)        ║
  ║    - sounds/idle.wav        (no enemies diving)          ║
  ║  Audio gracefully degrades if files are missing.         ║
  ║                                                          ║
  ║  CONFIG TWEAKING:                                        ║
  ║  All tunable values live in the CONFIG object at the     ║
  ║  top of the <script> block. Adjust:                      ║
  ║    - colors for theming                                  ║
  ║    - player.speed for movement responsiveness            ║
  ║    - player.shotCooldown for delay between shots (ms)    ║
  ║    - difficulty.* for game balance                       ║
  ║    - toggles.* to enable/disable features                ║
  ║                                                          ║
  ║  TOUCH INPUT:                                            ║
  ║    - Drag anywhere on canvas to move player proportionally║
  ║    - Tap/click to shoot (ignores drag state)             ║
  ║    - Double-tap top-center area to pause/resume          ║
  ║    - Multi-touch supported (primary finger moves,        ║
  ║      secondary taps fire)                                ║
  ║                                                          ║
  ║  CONTROLS:                                               ║
  ║    - Arrow keys / WASD: move                             ║
  ║    - Space: shoot (hold for auto-fire)                   ║
  ║    - P / ESC: pause/resume                               ║
  ╚══════════════════════════════════════════════════════════╝
-->

<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
  }

  canvas {
    display: block;
    object-fit: contain;
    margin: auto;
    image-rendering: -webkit-optimize-contrast;
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
// ================================================================
//  CONFIG — Centralized game parameters. Change here only.
// ================================================================
const CONFIG = {
  canvas: { width: 480, height: 800, scaleToFit: true },
  colors: {
    bg: '#020208',
    player: '#00f0ff',
    playerBullet: '#00f0ff',
    enemyBasic: '#ff4a6d',
    enemyZigzag: '#f5a623',
    enemyTurret: '#b088f9',
    enemyBullet: '#ff4a6d',
    particles: ['#ffffff', '#00f0ff', '#ff4a6d', '#f5a623'],
    accent: '#00f0ff'
  },
  player: { speed: 5, lives: 3, maxPlayerBullets: 2, respawnInvuln: 3000, shotCooldown: 200 },
  bullets: {
    playerSpeed: 12,
    enemySpeed: 7,
    // Bullet line dimensions (pixels)
    playerLength: 16,
    playerWidth: 3,
    enemyLength: 20,
    enemyWidth: 2
  },
  enemies: {
    formationSpeed: 0.03,
    diveFrequency: 0.007,
    returnSpeed: 3,
    formationStartY: 70,   // Y offset for the top row of the enemy formation
    health: { basic: 1, zigzag: 1, turret: 2 },
    shootChance: { basic: 0.04, zigzag: 0.04, turret: 0.08 },
    dive: {
      curveRadius: 80,
      diveSpeed: 180,
      diveDepth: 0.88
    },
    idle: {
      swayAmount: 40,
      swaySpeed: 1.0,
      swayCycles: 5,
      breathAmount: 10,
      breathSpeed: 1.0,
      breathCycles: 5
    }
  },
  particles: { countOnDeath: 18, speedRange: [1, 4], lifetime: 40, fadeRate: 0.025 },
  stars: {
    count: 200,              // total number of stars in the field
    speed: 0.5,              // base downward scroll speed (pixels per frame)
    speedVariation: 1.5,     // additional random speed per star (0..value)
    minSize: 0.5,            // smallest star radius
    maxSize: 2.5,            // largest star radius
    flickerSpeed: 0.06,      // base flicker frequency multiplier
    flickerVariation: 0.08,  // per-star flicker randomness
    minAlpha: 0.15,          // dimmest star brightness
    maxAlpha: 1.0            // brightest star brightness
  },
  audio: {
    shoot: 'sounds/shoot.wav',
    hit: 'sounds/hit.wav',
    explosion: 'sounds/explosion.wav',
    levelUp: 'sounds/levelup.wav',
    gameOver: 'sounds/gameover.wav',
    idle: 'sounds/idle.wav',
    dive: 'sounds/dive.wav',
    volume: 0.6,
    enabled: true
  },
  toggles: { particles: true, highScore: true, mobileControls: true },
  difficulty: { scorePerKill: 100, wavesToProgress: 3, maxWave: 20 }
};

// ================================================================
//  AUDIO SYSTEM — Web Audio API with silent fallback
// ================================================================
const AudioSys = (() => {
  let ctx = null;
  let masterGain = null;
  const buffers = {};
  // Track active sources for stoppable sounds (idle, dive)
  const activeSources = {};

  /** Initialize AudioContext on first user gesture (browser policy) */
  function init() {
    if (ctx) return;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      // Shared master gain node reduces per-sound node creation overhead
      masterGain = ctx.createGain();
      masterGain.gain.value = CONFIG.audio.volume;
      masterGain.connect(ctx.destination);
    } catch (e) {
      // Audio not supported — game continues silently
      return;
    }
    // Preload all audio files now that context is ready
    if (CONFIG.audio.enabled) {
      Object.keys(CONFIG.audio)
        .filter(k => k !== 'volume' && k !== 'enabled')
        .forEach(key => preload(CONFIG.audio[key]));
    }
  }

  /** Preload an audio file and cache its decoded buffer */
  function preload(url) {
    if (!CONFIG.audio.enabled || !ctx) return Promise.resolve(null);
    if (buffers[url]) return Promise.resolve(buffers[url]);
    return fetch(url)
      .then(r => r.arrayBuffer())
      .then(ab => ctx.decodeAudioData(ab))
      .then(buf => { buffers[url] = buf; return buf; })
      .catch(() => { buffers[url] = null; return null; }); // Silent fallback
  }

  /** Stop any currently playing source for the given sound key */
  function stop(soundKey) {
    if (!ctx) return;
    const src = activeSources[soundKey];
    if (src) {
      try { src.stop(); } catch (e) { /* already stopped */ }
      try { src.disconnect(); } catch (e) { }
      delete activeSources[soundKey];
    }
  }

  /** Play a preloaded sound buffer (one-shot, not tracked) */
  function play(soundKey) {
    if (!CONFIG.audio.enabled || !ctx || !masterGain) return;
    const url = CONFIG.audio[soundKey];
    if (!url) return;
    const buf = buffers[url];
    if (!buf) return;
    try {
      const source = ctx.createBufferSource();
      source.buffer = buf;
      // Connect directly to shared master gain (no per-sound gain node)
      source.connect(masterGain);
      source.start(0);
    } catch (e) { /* degrade silently */ }
  }

  /** Play a stoppable sound (only one instance at a time per key).
   *  Stops any previous instance of the same sound before playing. */
  function playStoppable(soundKey) {
    if (!CONFIG.audio.enabled || !ctx || !masterGain) return;
    const url = CONFIG.audio[soundKey];
    if (!url) return;
    const buf = buffers[url];
    if (!buf) return;
    // Stop any previous instance of this sound first
    stop(soundKey);
    try {
      const source = ctx.createBufferSource();
      source.buffer = buf;
      source.connect(masterGain);
      source.start(0);
      activeSources[soundKey] = source;
      // Clean up tracking when the sound finishes naturally
      source.onended = () => { delete activeSources[soundKey]; };
    } catch (e) { /* degrade silently */ }
  }

  return { init, preload, play, stop, playStoppable };
})();

// ================================================================
//  CANVAS SETUP — Responsive, maintains 3:2 aspect ratio
// ================================================================
const canvas = document.getElementById('gameCanvas');
const c = canvas.getContext('2d');
const W = CONFIG.canvas.width;
const H = CONFIG.canvas.height;

canvas.width = W;
canvas.height = H;

/** Scale canvas to fit the viewport while preserving aspect ratio */
function resizeCanvas() {
  if (!CONFIG.canvas.scaleToFit) return;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const scale = Math.min(vw / W, vh / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

/** Cached canvas rect for touch coordinate conversion (avoids layout thrashing on mobile) */
let cachedCanvasRect = null;
function updateCanvasRect() {
  cachedCanvasRect = canvas.getBoundingClientRect();
}
window.addEventListener('resize', () => { updateCanvasRect(); resizeCanvas(); });
updateCanvasRect();

/** Convert screen/touch coordinates to canvas logical coordinates (uses cached rect) */
function toCanvasX(clientX) {
  const r = cachedCanvasRect;
  return ((clientX - r.left) / r.width) * W;
}
function toCanvasY(clientY) {
  const r = cachedCanvasRect;
  return ((clientY - r.top) / r.height) * H;
}

// ================================================================
//  STATE MACHINE
// ================================================================
const STATE = { MENU: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };
let gameState = STATE.MENU;

// ================================================================
//  INPUT SYSTEM — Keyboard + Touch/Mouse
// ================================================================
const keys = {};
let touchState = { active: false, startX: 0, startY: 0, lastX: 0, lastY: 0 };
let shootPressed = false;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); shootPressed = true; }
  if (e.code === 'KeyP' || e.code === 'Escape') {
    if (gameState === STATE.PLAYING) gameState = STATE.PAUSED;
    else if (gameState === STATE.PAUSED) gameState = STATE.PLAYING;
  }
  // Start game on Space or Enter from menu/gameover
  if (gameState === STATE.MENU || gameState === STATE.GAME_OVER) {
    if (e.code === 'Space' || e.code === 'Enter') {
      AudioSys.init();
      startGame();
    }
  }
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'Space') shootPressed = false;
});

// Touch handling
canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('mousedown', handleMouseDown);
canvas.addEventListener('mouseup', handleMouseUp);
canvas.addEventListener('mousemove', handleMouseMove);

let mouseDown = false;
let mouseTouchState = null;

function handleMouseDown(e) {
  AudioSys.init();
  if (gameState === STATE.MENU || gameState === STATE.GAME_OVER) { startGame(); return; }
  if (gameState === STATE.PAUSED) { gameState = STATE.PLAYING; return; }
  mouseDown = true;
  const cx = toCanvasX(e.clientX);
  const cy = toCanvasY(e.clientY);
  mouseTouchState = { active: true, lastX: cx, lastY: cy };
  shootPressed = true;
  // Double-tap pause zone: top-center
  if (cy < 80) togglePauseTouch();
}

function handleMouseUp() {
  mouseDown = false;
  mouseTouchState = null;
  shootPressed = false;
}

function handleMouseMove(e) {
  if (!mouseDown || !mouseTouchState || gameState !== STATE.PLAYING) return;
  const cx = toCanvasX(e.clientX);
  const cy = toCanvasY(e.clientY);
  if (player) {
    player.x += (cx - mouseTouchState.lastX);
    // Vertical movement disabled
    clampPlayer();
  }
  mouseTouchState.lastX = cx;
  mouseTouchState.lastY = cy;
}

function handleTouchStart(e) {
  e.preventDefault();
  AudioSys.init();
  if (gameState === STATE.MENU || gameState === STATE.GAME_OVER) { startGame(); return; }
  // Double-tap detection for pause
  const now = Date.now();
  if (e.touches.length > 0) {
    const ty = toCanvasY(e.touches[0].clientY);
    if (ty < 80 && now - lastTapTime < 300) { togglePauseTouch(); }
    lastTapTime = now;
  }
  touchState.active = true;
  const first = e.touches[0];
  touchState.startX = toCanvasX(first.clientX);
  touchState.startY = toCanvasY(first.clientY);
  touchState.lastX = touchState.startX;
  touchState.lastY = touchState.startY;
  shootPressed = true;
}

function handleTouchMove(e) {
  e.preventDefault();
  if (!touchState.active || gameState !== STATE.PLAYING || !player) return;
  const first = e.touches[0];
  const cx = toCanvasX(first.clientX);
  const cy = toCanvasY(first.clientY);
  player.x += (cx - touchState.lastX);
  // Vertical movement disabled
  clampPlayer();
  touchState.lastX = cx;
  touchState.lastY = cy;
  // Additional touches fire
  if (e.touches.length > 1) shootPressed = true;
}

function handleTouchEnd(e) {
  e.preventDefault();
  touchState.active = false;
  if (e.touches.length === 0) shootPressed = false;
  else shootPressed = true; // Keep firing if other fingers down
}

let lastTapTime = 0;
function togglePauseTouch() {
  if (gameState === STATE.PLAYING) gameState = STATE.PAUSED;
  else if (gameState === STATE.PAUSED) gameState = STATE.PLAYING;
}

// ================================================================
//  GAME ENTITIES
// ================================================================
let player = null;
let bullets = [];
let enemies = [];
let particles = [];
let stars = [];
let waveManager = null;
let score = 0;
let highScore = parseInt(localStorage.getItem('galaga_highscore')) || 0;
let lastTime = 0;
let globalTime = 0;
let lastShotTime = 0;

// Dive/idle sound state tracking
let idleSoundPlaying = false;  // whether idle.wav is currently playing
let idleSoundReady = false;    // whether we're in a state where idle should play (all dives done)

// Idle animation state
let idleMode = 'swaying'; // 'swaying' or 'breathing'
let idleCycleCount = 0;   // how many cycles completed in current mode
let idleStartTime = 0;    // when current animation phase started
// Store the grid layout info for breathing calculations
let gridCols = 8;
let gridRows = 5;

// --- Player ---
function createPlayer() {
  return {
    x: W / 2,
    y: H - 80,
    width: 27,
    height: 26,
    lives: CONFIG.player.lives,
    invulnTimer: 0,
    alive: true
  };
}

function clampPlayer() {
  if (!player) return;
  player.x = Math.max(player.width / 2, Math.min(W - player.width / 2, player.x));
  player.y = Math.max(player.height / 2, Math.min(H - player.height / 2, player.y));
}

// --- Bullet ---
function createBullet(x, y, vx, vy, type) {
  const len = type === 'player' ? CONFIG.bullets.playerLength : CONFIG.bullets.enemyLength;
  const w = type === 'player' ? CONFIG.bullets.playerWidth : CONFIG.bullets.enemyWidth;
  // Angle of travel (used to orient the bullet line)
  const angle = Math.atan2(vy, vx);
  return { x, y, vx, vy, type, length: len, width: w, angle, alive: true };
}

// --- Enemy ---
function createEnemy(type, gridX, gridY, formationX, formationY, rowColCount) {
  const hpMap = CONFIG.enemies.health;
  return {
    type, // 'basic', 'zigzag', 'turret'
    x: formationX,
    y: formationY,
    gridX,
    gridY,
    rowColCount, // number of enemies in this enemy's row (for breathing animation)
    hp: hpMap[type] || 1,
    maxHp: hpMap[type] || 1,
    state: 'formation', // 'formation', 'diving', 'wrapping'
    diveTimer: 0,
    divePhase: 0,
    alive: true,
    shootTimer: Math.random() * 100,
    // Rotation (radians) — 0 = upright in formation
    rotation: 0,
    // For Galaga-style dive: segment-based path
    diveStartTime: 0,
    diveStartX: formationX,
    diveStartY: formationY,
    diveDirection: (Math.random() < 0.5) ? -1 : 1, // top U-turn direction
    divePath: null, // { segments, totalLength }
    // For return / wrap
    targetX: formationX,
    targetY: formationY,
    // For wrapping: visibility during wrap animation
    wrapAlpha: 1
  };
}

// --- Particle ---
function createParticle(x, y, vx, vy, color, life, size) {
  return { x, y, vx, vy, color, life, maxLife: life, size, alive: true };
}

// ================================================================
//  WAVE MANAGER — Spawns enemies, tracks progression
// ================================================================
function createWaveManager() {
  return {
    wave: 1,
    enemiesSpawned: 0,
    enemiesInWave: 0,
    waveComplete: false,
    timer: 0,
    spawnPhase: 0
  };
}

/** Get the grid dimensions for the current wave */
function getWaveLayout(wave) {
  const cols = Math.min(8, 5 + Math.floor(wave / 3));
  const rows = Math.min(5, 2 + Math.floor(wave / 4));
  return { cols, rows };
}

/** Difficulty multiplier that scales with wave number */
function getDifficultyMultiplier(wave) {
  return 1 + (wave - 1) * 0.15;  // 15% harder per wave
}

/** Spawn a full wave of enemies in fixed Galaga-style formation.
 *  Layout (same every wave, all rows horizontally centered):
 *    ROW 0: 4  turret  enemies
 *    ROW 1: 8  basic   enemies
 *    ROW 2: 8  basic   enemies
 *    ROW 3: 10 zigzag  enemies
 *    ROW 4: 10 zigzag  enemies
 */
function spawnWave(wm) {
  const spacingX = 42;          // horizontal spacing between adjacent enemies
  const spacingY = 44;          // vertical spacing between rows
  // Center the widest row (10 enemies) on the canvas, then derive row starts
  const widest = 10;
  const baseStartX = (W - widest * spacingX) / 2 + spacingX / 2;
  const startY = CONFIG.enemies.formationStartY;
  const difficulty = getDifficultyMultiplier(wm.wave);

  // Fixed rows definition: [type, count]
  const rows = [
    { type: 'turret',  count: 4  },
    { type: 'basic',   count: 8  },
    { type: 'basic',   count: 8  },
    { type: 'zigzag',  count: 10 },
    { type: 'zigzag',  count: 10 },
  ];

  // Store grid dimensions for breathing animation calculations
  gridCols = widest;
  gridRows = rows.length;

  // Reset idle animation state for new wave
  idleMode = 'swaying';
  idleStartTime = globalTime;

  enemies = [];

  rows.forEach((row, r) => {
    // Horizontally center each row
    const rowStartX = (W - row.count * spacingX) / 2 + spacingX / 2;
    for (let col = 0; col < row.count; col++) {
      const fx = rowStartX + col * spacingX;
      const fy = startY + r * spacingY;
      const enemy = createEnemy(row.type, col, r, fx, fy, row.count);
    //   // Scale HP with difficulty
    //   enemy.hp = Math.ceil(enemy.hp * difficulty);
    //   enemy.maxHp = enemy.hp;
      enemies.push(enemy);
    }
  });

  wm.enemiesInWave = enemies.length;
  wm.enemiesSpawned = 0;
  wm.waveComplete = false;
}

// ================================================================
//  IDLE ANIMATION SYSTEM — Swaying and Breathing
// ================================================================

/**
 * Calculate the horizontal offset for swaying animation.
 * Pattern: center → left → center → right → center (one full cycle)
 * Uses a shaped sine wave to create smooth left-center-right-center motion.
 * Returns offset in pixels (-swayAmount to +swayAmount).
 */
function getSwayOffset(time, speed, amount) {
  // Use sin to get smooth oscillation between -1 and 1
  // Each full sine cycle = left→center→right→center
  return Math.sin(time * speed) * amount;
}

/**
 * Calculate diagonal offset for breathing animation.
 * Enemies on left half move down-left, right half move down-right.
 * Amount depends on grid position: center enemies move least, edges move most.
 * Top enemies move least in Y, bottom enemies move most in Y.
 */
function getBreathOffset(enemy, time, speed, baselineAmount, totalCols, totalRows) {
  const phase = Math.sin(time * speed); // -1 to 1

  // Normalize grid position to 0..1 range using the enemy's own row column count
  // so that rows with fewer enemies still get correct left/right breathing split
  const rowCols = enemy.rowColCount || totalCols;
  const normX = enemy.gridX / Math.max(1, rowCols - 1); // 0 = left edge, 1 = right edge
  const normY = enemy.gridY / Math.max(1, totalRows - 1); // 0 = top, 1 = bottom

  // X offset: enemies on edges move more, center moves less
  // Distance from horizontal center (0..0.5), normalized to 0..1
  const xEdgeFactor = Math.abs(normX - 0.5) * 2; // 0 at center, 1 at edges
  // Left side moves left (negative), right side moves right (positive)
  const xDirection = normX < 0.5 ? -1 : 1;
  const offsetX = xEdgeFactor * baselineAmount * phase * xDirection;

  // Y offset: bottom moves more, top moves less
  // Clamp to a minimum factor so the top row still gets a small (but non-zero) Y movement
  const minY = 0.2; // top row gets ~20% of full Y movement
  const yFactor = minY + normY * (1 - minY); // 0.2 at top, 1.0 at bottom
  const offsetY = yFactor * baselineAmount * phase;

  return { x: offsetX, y: offsetY };
}

/**
 * Main update for idle animations. Switches between swaying and breathing.
 */
function updateFormationPositions() {
  const idle = CONFIG.enemies.idle;
  const elapsed = globalTime - idleStartTime;

  // Determine how many cycles have elapsed in current mode
  const cyclesPerMode = idleMode === 'swaying' ? idle.swayCycles : idle.breathCycles;
  const speed = idleMode === 'swaying' ? idle.swaySpeed : idle.breathSpeed;
  // One cycle = 2*PI radians
  const cycleDuration = (2 * Math.PI) / speed;
  const elapsedCycles = elapsed / cycleDuration;

  // Switch mode when cycles completed
  if (elapsedCycles >= cyclesPerMode) {
    // Ensure we end at center before switching
    idleMode = idleMode === 'swaying' ? 'breathing' : 'swaying';
    idleStartTime = globalTime;
  }

  if (idleMode === 'swaying') {
    const swayElapsed = globalTime - idleStartTime;
    const offset = getSwayOffset(swayElapsed, idle.swaySpeed, idle.swayAmount);

    enemies.forEach(e => {
      if (e.state !== 'formation') return;
      const targetX = e.targetX + offset;
      const targetY = e.targetY;
      e.x += (targetX - e.x) * 0.2;
      e.y += (targetY - e.y) * 0.2;
    });
  } else {
    // Breathing mode
    const breathElapsed = globalTime - idleStartTime;

    enemies.forEach(e => {
      if (e.state !== 'formation') return;
      const offset = getBreathOffset(e, breathElapsed, idle.breathSpeed, idle.breathAmount, gridCols, gridRows);
      const targetX = e.targetX + offset.x;
      const targetY = e.targetY + offset.y;
      e.x += (targetX - e.x) * 0.2;
      e.y += (targetY - e.y) * 0.2;
    });
  }
}

/**
 * Galaga-style dive system — segment-based path with U-turns.
 *
 * Each dive is built from 7 segments:
 *   1) Top U-turn: semicircle that starts upright, curves up-left/up-right,
 *      and ends facing downward along the dive line.
 *   2) Straight descent to mid-screen: travels toward the player's
 *      initially anticipated position.
 *   3-4) Mid-screen S-curve: two quarter-circle arcs that shift the enemy
 *      laterally toward a newly recalculated player position while keeping
 *      the enemy moving downward the entire time.
 *   5) Straight descent to final target: continues toward the bottom.
 *   6) Bottom U-turn: semicircle that curves from the dive line into
 *      the ascent line back toward formation.
 *   7) Straight ascent: travels back toward the formation position.
 *
 * Rotation is always derived from the movement tangent so the enemy
 * faces its direction of travel. As the enemy nears the grid on the
 * ascent, rotation smoothly interpolates back to 0 (upright).
 */

/**
 * Build a segment-based dive path for the given enemy.
 *
 * Path structure (7 segments):
 *   1) Top U-turn: semicircle — starts upright, curves up-left/up-right,
 *      ends facing straight down.
 *   2) Straight descent to mid-screen: from U-turn exit toward the
 *      player's initially anticipated position at ~45% canvas height.
 *   3) S-curve arc A: quarter-circle — turns from facing-down to
 *      facing-sideways (left or right depending on new target).
 *   4) S-curve arc B: quarter-circle — turns from facing-sideways
 *      back to facing-down, completing the lateral shift.
 *   5) Straight descent to final target: from S-curve exit to the
 *      bottom of the dive.
 *   6) Bottom U-turn: semicircle — starts facing down, curves up,
 *      ends facing straight up.
 *   7) Straight ascent: from U-turn exit back to formation.
 *
 * Arc segments store: { cx, cy, radius, startAngle, endAngle, isCW }
 *   - CW arc tangent:  angle + PI/2
 *   - CCW arc tangent: angle - PI/2
 *
 * Line segments store: { fromX, fromY, toX, toY }
 *
 * Total arc+line lengths determine travel time at a fixed speed.
 */
function buildDivePath(enemy) {
  const R = CONFIG.enemies.dive.curveRadius;
  const dir = enemy.diveDirection; // -1 = curve left, +1 = curve right
  const startX = enemy.diveStartX;
  const startY = enemy.diveStartY;
  const bottomY = H * CONFIG.enemies.dive.diveDepth;

  // --- Mid-screen Y threshold: where the enemy recalculates target ---
  const midScreenY = H * 0.45;

  // --- Initial target: player's anticipated position at mid-screen ---
  const midTargetX = Math.max(30, Math.min(W - 30, player.x + (Math.random() - 0.5) * 80));

  // =====================
  // Segment 1: Top U-turn (semicircle, sweep = PI)
  // Starts facing up (-PI/2), ends facing down (PI/2)
  // =====================
  let topArc;
  if (dir === 1) {
    // CW arc — center to the RIGHT of start
    const cx = startX + R;
    const cy = startY;
    // startAngle = -PI → point = (cx - R, cy) = (startX, startY) ✓
    // tangent at -PI = -PI + PI/2 = -PI/2 (up) ✓
    // endAngle = 0 → point = (cx + R, cy) = (startX + 2R, startY)
    // tangent at 0 = 0 + PI/2 = PI/2 (down) ✓
    topArc = {
      type: 'arc', cx, cy, radius: R,
      startAngle: -Math.PI, endAngle: 0, isCW: true,
      length: R * Math.PI
    };
  } else {
    // CCW arc — center to the LEFT of start
    const cx = startX - R;
    const cy = startY;
    // startAngle = 0 → point = (cx + R, cy) = (startX, startY) ✓
    // tangent at 0 = 0 - PI/2 = -PI/2 (up) ✓
    // endAngle = -PI → point = (cx - R, cy) = (startX - 2R, startY)
    // tangent at -PI = -PI - PI/2 = -3PI/2 = PI/2 (down) ✓
    topArc = {
      type: 'arc', cx, cy, radius: R,
      startAngle: 0, endAngle: -Math.PI, isCW: false,
      length: R * Math.PI
    };
  }
  const topExitX = topArc.cx + topArc.radius * Math.cos(topArc.endAngle);
  const topExitY = topArc.cy + topArc.radius * Math.sin(topArc.endAngle);

  // =====================
  // Segment 2: Straight descent to mid-screen
  // From top U-turn exit toward the initial anticipated player position at mid-screen Y
  // =====================
  const midDx = midTargetX - topExitX;
  const midDy = midScreenY - topExitY;
  const midLength = Math.sqrt(midDx * midDx + midDy * midDy);
  const midLine = {
    type: 'line',
    fromX: topExitX, fromY: topExitY,
    toX: midTargetX, toY: midScreenY,
    length: midLength
  };

  // --- At mid-screen: recalculate player's anticipated position for the final dive target ---
  const finalTargetX = Math.max(30, Math.min(W - 30, player.x + (Math.random() - 0.5) * 100));
  const finalTargetY = bottomY;

  // =====================
  // Segments 3 & 4: Mid-screen S-curve (two quarter-circle arcs)
  // Enemy is facing down at mid-screen. The S-curve shifts the enemy laterally
  // toward the new target while keeping it moving DOWNWARD the entire time.
  //   Arc A: quarter-circle from facing-down to facing-sideways
  //   Arc B: quarter-circle from facing-sideways back to facing-down
  // Total lateral shift = 2R, total vertical drop = 2R.
  // =====================
  const midCurveDir = (finalTargetX >= midTargetX) ? 1 : -1;

  let arcA, arcB;
  if (midCurveDir === 1) {
    // --- Curve RIGHT ---
    // Arc A (CCW): down → right
    //   tangent = angle - PI/2
    //   start: tangent=PI/2 (down) → angle=PI, point=(cx-R, cy)=(midTargetX, midScreenY)
    //   end:   tangent=0 (right)  → angle=PI/2, point=(cx, cy+R)=(midTargetX+R, midScreenY+R)
    arcA = {
      type: 'arc',
      cx: midTargetX + R, cy: midScreenY, radius: R,
      startAngle: Math.PI, endAngle: Math.PI / 2, isCW: false,
      length: R * Math.PI / 2,
      rotationBlend: 0.6  // blend 60% toward downward-facing to reduce tilt
    };
    // Arc B (CW): right → down
    //   tangent = angle + PI/2
    //   start: tangent=0 (right)  → angle=-PI/2, point=(cx, cy-R)=(midTargetX+R, midScreenY+R)
    //   end:   tangent=PI/2 (down) → angle=0, point=(cx+R, cy)=(midTargetX+2R, midScreenY+2R)
    arcB = {
      type: 'arc',
      cx: midTargetX + R, cy: midScreenY + 2 * R, radius: R,
      startAngle: -Math.PI / 2, endAngle: 0, isCW: true,
      length: R * Math.PI / 2,
      rotationBlend: 0.6  // blend 60% toward downward-facing to reduce tilt
    };
  } else {
    // --- Curve LEFT ---
    // Arc A (CW): down → left
    //   tangent = angle + PI/2
    //   start: tangent=PI/2 (down) → angle=0, point=(cx+R, cy)=(midTargetX, midScreenY)
    //   end:   tangent=PI (left)   → angle=PI/2, point=(cx, cy+R)=(midTargetX-R, midScreenY+R)
    arcA = {
      type: 'arc',
      cx: midTargetX - R, cy: midScreenY, radius: R,
      startAngle: 0, endAngle: Math.PI / 2, isCW: true,
      length: R * Math.PI / 2,
      rotationBlend: 0.6  // blend 60% toward downward-facing to reduce tilt
    };
    // Arc B (CCW): left → down
    //   tangent = angle - PI/2
    //   start: tangent=PI (left)   → angle=3PI/2, point=(cx, cy-R)=(midTargetX-R, midScreenY+R)
    //   end:   tangent=PI/2 (down) → angle=PI, point=(cx-R, cy)=(midTargetX-2R, midScreenY+2R)
    arcB = {
      type: 'arc',
      cx: midTargetX - R, cy: midScreenY + 2 * R, radius: R,
      startAngle: 3 * Math.PI / 2, endAngle: Math.PI, isCW: false,
      length: R * Math.PI / 2,
      rotationBlend: 0.6  // blend 60% toward downward-facing to reduce tilt
    };
  }
  const sCurveExitX = arcB.cx + arcB.radius * Math.cos(arcB.endAngle);
  const sCurveExitY = arcB.cy + arcB.radius * Math.sin(arcB.endAngle);

  // =====================
  // Segment 5: Straight descent from S-curve exit to final target
  // =====================
  const finalDx = finalTargetX - sCurveExitX;
  const finalDy = finalTargetY - sCurveExitY;
  const finalLength = Math.sqrt(finalDx * finalDx + finalDy * finalDy);
  const finalLine = {
    type: 'line',
    fromX: sCurveExitX, fromY: sCurveExitY,
    toX: finalTargetX, toY: finalTargetY,
    length: finalLength
  };

  // =====================
  // Segment 6: Bottom U-turn (semicircle, sweep = PI)
  // Starts facing down (PI/2), ends facing up (-PI/2)
  // =====================
  const ascentTargetX = enemy.targetX;
  const ascentTargetY = enemy.targetY;
  const bottomDir = (ascentTargetX >= finalTargetX) ? 1 : -1;

  let bottomArc;
  if (bottomDir === 1) {
    const cx = finalTargetX - R;
    const cy = finalTargetY;
    bottomArc = {
      type: 'arc', cx, cy, radius: R,
      startAngle: 0, endAngle: Math.PI, isCW: true,
      length: R * Math.PI
    };
  } else {
    const cx = finalTargetX + R;
    const cy = finalTargetY;
    bottomArc = {
      type: 'arc', cx, cy, radius: R,
      startAngle: Math.PI, endAngle: 0, isCW: false,
      length: R * Math.PI
    };
  }
  const bottomExitX = bottomArc.cx + bottomArc.radius * Math.cos(bottomArc.endAngle);
  const bottomExitY = bottomArc.cy + bottomArc.radius * Math.sin(bottomArc.endAngle);

  // =====================
  // Segment 7: Straight ascent
  // From bottom U-turn exit to formation position
  // =====================
  const ascentDx = ascentTargetX - bottomExitX;
  const ascentDy = ascentTargetY - bottomExitY;
  const ascentLength = Math.sqrt(ascentDx * ascentDx + ascentDy * ascentDy);
  const ascentLine = {
    type: 'line',
    fromX: bottomExitX, fromY: bottomExitY,
    toX: ascentTargetX, toY: ascentTargetY,
    length: ascentLength
  };

  const segments = [topArc, midLine, arcA, arcB, finalLine, bottomArc, ascentLine];
  const totalLength = segments.reduce((sum, s) => sum + s.length, 0);
  return { segments, totalLength };
}

/**
 * Build a dive path for non-zigzag enemies (basic, turret).
 *
 * Same as buildDivePath but WITHOUT the bottom U-turn and ascent.
 * The enemy follows segments 1-5 (top U-turn, straight descent, S-curve,
 * final descent) but the final line extends all the way off-screen.
 * When the enemy goes fully off-screen it wraps back at the top.
 *
 * Path structure (5 segments):
 *   1) Top U-turn: semicircle
 *   2) Straight descent to mid-screen
 *   3) S-curve arc A
 *   4) S-curve arc B
 *   5) Straight descent extended well past bottom of screen
 */
function buildDivePathNoReturn(enemy) {
  const R = CONFIG.enemies.dive.curveRadius;
  const dir = enemy.diveDirection;
  const startX = enemy.diveStartX;
  const startY = enemy.diveStartY;

  const midScreenY = H * 0.45;
  const midTargetX = Math.max(30, Math.min(W - 30, player.x + (Math.random() - 0.5) * 80));

  // -- Segment 1: Top U-turn --
  let topArc;
  if (dir === 1) {
    const cx = startX + R;
    const cy = startY;
    topArc = {
      type: 'arc', cx, cy, radius: R,
      startAngle: -Math.PI, endAngle: 0, isCW: true,
      length: R * Math.PI
    };
  } else {
    const cx = startX - R;
    const cy = startY;
    topArc = {
      type: 'arc', cx, cy, radius: R,
      startAngle: 0, endAngle: -Math.PI, isCW: false,
      length: R * Math.PI
    };
  }
  const topExitX = topArc.cx + topArc.radius * Math.cos(topArc.endAngle);
  const topExitY = topArc.cy + topArc.radius * Math.sin(topArc.endAngle);

  // -- Segment 2: Straight descent to mid-screen --
  const midDx = midTargetX - topExitX;
  const midDy = midScreenY - topExitY;
  const midLength = Math.sqrt(midDx * midDx + midDy * midDy);
  const midLine = {
    type: 'line',
    fromX: topExitX, fromY: topExitY,
    toX: midTargetX, toY: midScreenY,
    length: midLength
  };

  // Recalculate final target at mid-screen
  const finalTargetX = Math.max(30, Math.min(W - 30, player.x + (Math.random() - 0.5) * 100));

  // -- Segments 3 & 4: Mid-screen S-curve --
  const midCurveDir = (finalTargetX >= midTargetX) ? 1 : -1;

  let arcA, arcB;
  if (midCurveDir === 1) {
    arcA = {
      type: 'arc',
      cx: midTargetX + R, cy: midScreenY, radius: R,
      startAngle: Math.PI, endAngle: Math.PI / 2, isCW: false,
      length: R * Math.PI / 2,
      rotationBlend: 0.6
    };
    arcB = {
      type: 'arc',
      cx: midTargetX + R, cy: midScreenY + 2 * R, radius: R,
      startAngle: -Math.PI / 2, endAngle: 0, isCW: true,
      length: R * Math.PI / 2,
      rotationBlend: 0.6
    };
  } else {
    arcA = {
      type: 'arc',
      cx: midTargetX - R, cy: midScreenY, radius: R,
      startAngle: 0, endAngle: Math.PI / 2, isCW: true,
      length: R * Math.PI / 2,
      rotationBlend: 0.6
    };
    arcB = {
      type: 'arc',
      cx: midTargetX - R, cy: midScreenY + 2 * R, radius: R,
      startAngle: 3 * Math.PI / 2, endAngle: Math.PI, isCW: false,
      length: R * Math.PI / 2,
      rotationBlend: 0.6
    };
  }
  const sCurveExitX = arcB.cx + arcB.radius * Math.cos(arcB.endAngle);
  const sCurveExitY = arcB.cy + arcB.radius * Math.sin(arcB.endAngle);

  // -- Segment 5: Straight descent extended well off-screen --
  // Extend the line from S-curve exit through the final target X and
  // continue past the bottom of the screen with extra padding.
  const offScreenY = H + 80; // well below visible area
  const finalDx = finalTargetX - sCurveExitX;
  const finalDy = offScreenY - sCurveExitY;
  const finalLength = Math.sqrt(finalDx * finalDx + finalDy * finalDy);
  const finalLine = {
    type: 'line',
    fromX: sCurveExitX, fromY: sCurveExitY,
    toX: finalTargetX, toY: offScreenY,
    length: finalLength
  };

  const segments = [topArc, midLine, arcA, arcB, finalLine];
  const totalLength = segments.reduce((sum, s) => sum + s.length, 0);
  return { segments, totalLength };
}

/** Interpolate between two angles using the shortest angular path. */
function shortestAngleLerp(a, b, t) {
  let diff = b - a;
  while (diff >  Math.PI) diff -= 2 * Math.PI;
  while (diff < -Math.PI) diff += 2 * Math.PI;
  return a + diff * t;
}

/**
  * Evaluate position and rotation along a segment path at distance d from start.
  * Returns { x, y, rotation }.
  *
  * Rotation follows the movement tangent so the enemy faces its direction
  * of travel. A +PI/2 face-offset is applied because the enemy sprite's
  * "front" (eyes / antennae) points UP in local space (rotation = 0 means
  * the sprite faces up).  After the offset: tangent -PI/2 (up) gives
  * rotation 0 (upright); tangent +PI/2 (down) gives rotation PI (facing
  * down).
  *
  * A short blend zone at each segment boundary prevents the rotation from
  * "snapping" when the tangent of one segment doesn't perfectly match the
  * tangent of the next.
  *
  * On the final ascent segment, rotation smoothly blends back to 0 (upright)
  * as the enemy nears the formation grid.
  */
function evaluatePath(path, d, blendUprightOnLast = true) {
  let remaining = d;
  let prevSegment = null;
  const blendZone = 20; // pixels - smooth rotation over this distance at boundaries

  for (let i = 0; i < path.segments.length; i++) {
    const seg = path.segments[i];
    const isLastSegment = (i === path.segments.length - 1);

    if (remaining <= seg.length || isLastSegment) {
      const t = isLastSegment
        ? Math.min(remaining / seg.length, 1)
        : remaining / seg.length;

      let x, y, tangentRotation;

      if (seg.type === 'arc') {
        const angle = seg.startAngle + (seg.endAngle - seg.startAngle) * t;
        x = seg.cx + seg.radius * Math.cos(angle);
        y = seg.cy + seg.radius * Math.sin(angle);
        // Tangent direction:
        //   CW arc:  angle + PI/2
        //   CCW arc: angle - PI/2
        tangentRotation = seg.isCW ? (angle + Math.PI / 2) : (angle - Math.PI / 2);
      } else {
        // Line segment
        x = seg.fromX + (seg.toX - seg.fromX) * t;
        y = seg.fromY + (seg.toY - seg.fromY) * t;
        tangentRotation = Math.atan2(seg.toY - seg.fromY, seg.toX - seg.fromX);
      }

      // Add face-offset so the enemy sprite faces its direction of travel.
      // Sprite front points UP at rotation=0, so visualFacing = rotation - PI/2.
      // We want visualFacing == tangentRotation  =>  rotation = tangentRotation + PI/2.
      let rotation = tangentRotation + Math.PI / 2;

      // If this segment has a rotationBlend factor, blend toward downward-facing
      // to reduce aggressive tilting during mid-screen S-curves.
      // Downward-facing = tangent PI/2 => visual rotation = PI.
      if (seg.rotationBlend > 0) {
        const downwardRotation = Math.PI;
        let diff = downwardRotation - rotation;
        while (diff >  Math.PI) diff -= 2 * Math.PI;
        while (diff < -Math.PI) diff += 2 * Math.PI;
        rotation += diff * seg.rotationBlend;
      }

      // --- Blend at segment boundaries to prevent snapping ---
      if (prevSegment && remaining < blendZone) {
        // Tangent at the end of the previous segment
        let prevEndTangent;
        if (prevSegment.type === 'arc') {
          prevEndTangent = prevSegment.isCW
            ? (prevSegment.endAngle + Math.PI / 2)
            : (prevSegment.endAngle - Math.PI / 2);
        } else {
          prevEndTangent = Math.atan2(
            prevSegment.toY - prevSegment.fromY,
            prevSegment.toX - prevSegment.fromX
          );
        }
        let prevEndVisual = prevEndTangent + Math.PI / 2;
        // If the previous segment had a rotationBlend, apply it to the
        // previous-end visual rotation too, so the boundary blend starts
        // from the same blended value (prevents jitter at S-curve joins).
        if (prevSegment.rotationBlend > 0) {
          const downwardRotation = Math.PI;
          let diff = downwardRotation - prevEndVisual;
          while (diff >  Math.PI) diff -= 2 * Math.PI;
          while (diff < -Math.PI) diff += 2 * Math.PI;
          prevEndVisual += diff * prevSegment.rotationBlend;
        }
        const effectiveBlend = Math.min(blendZone, seg.length * 0.3);
        const blendT = Math.min(remaining / effectiveBlend, 1);
        rotation = shortestAngleLerp(prevEndVisual, rotation, blendT);
      }

      // On the last segment (ascent), blend rotation toward 0 (upright)
      // over the last 50% of the segment for a smooth lock-in.
      // Skip this for noReturn paths where the last segment is a descent.
      if (blendUprightOnLast && isLastSegment && t > 0.5) {
        const blendT = (t - 0.5) / 0.5; // 0..1
        let diff = -rotation;
        while (diff >  Math.PI) diff -= 2 * Math.PI;
        while (diff < -Math.PI) diff += 2 * Math.PI;
        rotation += diff * blendT;
      }

      return { x, y, rotation };
    }
    prevSegment = seg;
    remaining -= seg.length;
  }

  // Fallback: end of last segment, upright
  const last = path.segments[path.segments.length - 1];
  if (last.type === 'line') {
    return { x: last.toX, y: last.toY, rotation: 0 };
  }
  const endAngle = last.endAngle;
  const rot = last.isCW ? (endAngle + Math.PI / 2) : (endAngle - Math.PI / 2);
  return {
    x: last.cx + last.radius * Math.cos(endAngle),
    y: last.cy + last.radius * Math.sin(endAngle),
    rotation: rot + Math.PI / 2
  };
}

/**
 * Trigger an enemy to dive from formation.
 * Zigzag (yellow) enemies use the full Galaga-style curved dive with U-turns
 * and ascent back to formation.
 * Basic and turret enemies do the same top U-turn + S-curve but skip the
 * bottom U-turn — they continue straight down off-screen and wrap at top.
 */
function tryTriggerDive(dt) {
  const formationEnemies = enemies.filter(e => e.alive && e.state === 'formation');
  if (formationEnemies.length === 0) return;

  const candidate = formationEnemies[Math.floor(Math.random() * formationEnemies.length)];
  if (!candidate) return;

  const diveChance = CONFIG.enemies.diveFrequency * (1 + waveManager.wave * 0.15);
  if (Math.random() < diveChance) {
    candidate.state = 'diving';
    candidate.diveStartTime = globalTime;
    // Play dive sound and stop idle sound when an enemy begins diving
    AudioSys.stop('idle');
    idleSoundPlaying = false;
    idleSoundReady = false;
    AudioSys.playStoppable('dive');
    candidate.diveStartX = candidate.x;
    candidate.diveStartY = candidate.y;
    candidate.diveDirection = (Math.random() < 0.5) ? -1 : 1;
    candidate.rotation = 0;

    if (candidate.type === 'zigzag') {
      // Full dive path with bottom U-turn and ascent back to formation
      candidate.noReturn = false;
      candidate.divePath = buildDivePath(candidate);
    } else {
      // Same top U-turn + S-curve, but final line extends off-screen (no return)
      candidate.noReturn = true;
      candidate.divePath = buildDivePathNoReturn(candidate);
    }
  }
}

/**
 * Update diving enemies along their segment path.
 *
 * Zigzag (yellow) enemies follow the full path including bottom U-turn
 * and ascent back to formation.
 * Basic and turret enemies follow a path without the bottom U-turn —
 * when their path is complete they transition to 'wrapping' and
 * re-enter at the top of the screen.
 */
function updateDivingEnemies() {
  const diveSpeed = CONFIG.enemies.dive.diveSpeed || 200; // pixels per second

  enemies.forEach(e => {
    if (e.state !== 'diving') return;

    const elapsed = (globalTime - e.diveStartTime); // seconds
    const dist = elapsed * diveSpeed;

    if (!e.divePath) return;

    // Pass blendUprightOnLast: only zigzag (return) enemies blend upright on last segment
    const blendUpright = !e.noReturn;
    const pos = evaluatePath(e.divePath, dist, blendUpright);
    e.x = pos.x;
    e.y = pos.y;
    e.rotation = pos.rotation;

    // Enemy shooting during dive
    e.shootTimer -= 1;
    if (e.shootTimer <= 0) {
      const chanceMap = CONFIG.enemies.shootChance;
      const diffMult = getDifficultyMultiplier(waveManager.wave);
      if (Math.random() < chanceMap[e.type] * 2 * diffMult) {
        const speed = CONFIG.bullets.enemySpeed * Math.min(diffMult, 2.0);
        bullets.push(createBullet(
          e.x, e.y + 10,
          0,
          speed,
          'enemy'
        ));
      }
      e.shootTimer = Math.max(10, 30 + Math.random() * 60 - waveManager.wave * 2);
    }

    // Path complete
    if (dist >= e.divePath.totalLength) {
      if (e.noReturn) {
        // Non-zigzag: transition to wrapping — re-enter at top
        e.state = 'wrapping';
        e.x = e.targetX; // Snap to target X for re-entry (idle anim will adjust)
        e.y = -30; // Start above visible area
        e.rotation = 0; // Upright
        e.wrapAlpha = 0; // Fade in
        e.wrapTargetY = e.targetY;
      } else {
        // Zigzag: return to formation (idle anim will pull to animated offset)
        e.state = 'formation';
        e.rotation = 0;
        e.x = e.targetX;
        e.y = e.targetY;
      }
    }
  });

  // Check if all dives are complete — if so, play idle sound
  const divingEnemies = enemies.filter(e => e.alive && e.state === 'diving');
  if (divingEnemies.length === 0 && !idleSoundPlaying && gameState === STATE.PLAYING) {
    idleSoundReady = true;
    idleSoundPlaying = true;
    AudioSys.playStoppable('idle');
  }
}

/**
 * Update wrapping enemies — they slide down from the top of the screen
 * to their grid formation position, fading in as they approach.
 */
function updateWrappingEnemies() {
  const wrapSpeed = 4; // pixels per frame

  enemies.forEach(e => {
    if (e.state !== 'wrapping') return;

    // Fade in quickly
    e.wrapAlpha = Math.min(1, e.wrapAlpha + 0.05);

    // Slide toward target Y
    const dy = e.wrapTargetY - e.y;
    if (Math.abs(dy) < wrapSpeed) {
      // Arrived at formation position
      e.y = e.wrapTargetY;
      e.state = 'formation';
      e.rotation = 0;
      e.wrapAlpha = 1;
    } else {
      e.y += Math.sign(dy) * wrapSpeed;
    }
  });
}

/**
 * No separate returning phase — the return is part of the dive path
 * (segments 3-4) for zigzag enemies. This function is a no-op.
 */
function updateReturningEnemies() {
  // Return is handled inline in updateDivingEnemies
}

// ================================================================
//  FORMATION ENEMY SHOOTING
// ================================================================
function updateFormationShooting() {
  const diffMult = getDifficultyMultiplier(waveManager.wave);
  enemies.forEach(e => {
    if (e.state !== 'formation' || !e.alive) return;
    e.shootTimer -= 1;
    if (e.shootTimer <= 0) {
      const chanceMap = CONFIG.enemies.shootChance;
      if (Math.random() < chanceMap[e.type] * diffMult) {
        bullets.push(createBullet(
          e.x, e.y + 10,
          0,
          CONFIG.bullets.enemySpeed * Math.min(diffMult, 2.0),
          'enemy'
        ));
      }
      e.shootTimer = Math.max(20, 60 + Math.random() * 120 - waveManager.wave * 3);
    }
  });
}

// ================================================================
//  COLLISION DETECTION
// ================================================================

/** Check circle-circle overlap */
function circleCollide(x1, y1, r1, x2, y2, r2) {
  const dx = x1 - x2;
  const dy = y1 - y2;
  return (dx * dx + dy * dy) <= (r1 + r2) * (r1 + r2);
}

/**
 * Check if a rotated rectangle (bullet) overlaps a circle (enemy/player).
 * Uses the separating axis theorem: project the circle onto the
 * rectangle's local axes and check overlap on each.
 *
 * rectX, rectY — center of the bullet rectangle
 * rectW, rectH — width and height (length and width) of the bullet
 * angle — rotation of the bullet in radians
 * circX, circY — center of the circle (enemy or player hit-area)
 * circR — radius of the circle
 */
function rectCircleCollide(rectX, rectY, rectW, rectH, angle, circX, circY, circR) {
  // Transform circle center into rectangle's local space
  const cos = Math.cos(-angle);
  const sin = Math.sin(-angle);
  const dx = circX - rectX;
  const dy = circY - rectY;
  const localX = dx * cos - dy * sin;
  const localY = dx * sin + dy * cos;

  // Find the closest point on the rectangle to the circle center
  const halfW = rectW / 2;
  const halfH = rectH / 2;
  const closestX = Math.max(-halfW, Math.min(halfW, localX));
  const closestY = Math.max(-halfH, Math.min(halfH, localY));

  // Distance from closest point to circle center
  const distX = localX - closestX;
  const distY = localY - closestY;
  return (distX * distX + distY * distY) <= circR * circR;
}

/** Player bounding circle */
function playerCircle() {
  return { x: player.x, y: player.y, r: 11 };
}

function checkCollisions() {
  const pc = playerCircle();

  // Player bullets vs enemies — with bounding-box early exit
  bullets.forEach(b => {
    if (b.type !== 'player' || !b.alive) return;
    enemies.forEach(e => {
      if (!e.alive) return;
      // Quick AABB check before expensive rotated-rect collision
      const dx = b.x - e.x;
      const dy = b.y - e.y;
      const maxDist = Math.max(b.length, e.type === 'turret' ? 12 : e.type === 'zigzag' ? 11 : 10) + 15;
      if (Math.abs(dx) > maxDist || Math.abs(dy) > maxDist) return;
      const enemyR = e.type === 'turret' ? 12 : e.type === 'zigzag' ? 11 : 10;
      if (rectCircleCollide(b.x, b.y, b.length, b.width, b.angle, e.x, e.y, enemyR)) {
        b.alive = false;
        e.hp -= 1;
        AudioSys.play('hit');
        if (e.hp <= 0) {
          e.alive = false;
          score += CONFIG.difficulty.scorePerKill * (e.type === 'turret' ? 3 : e.type === 'zigzag' ? 2 : 1);
          spawnParticles(e.x, e.y, 12);
        } else {
          spawnParticles(b.x, b.y, 3);
        }
      }
    });
  });

  // Enemy bullets vs player — with bounding-box early exit
  if (player.alive && player.invulnTimer <= 0) {
    bullets.forEach(b => {
      if (b.type !== 'enemy' || !b.alive) return;
      const dx = b.x - pc.x;
      const dy = b.y - pc.y;
      if (Math.abs(dx) > 20 || Math.abs(dy) > 20) return;
      if (rectCircleCollide(b.x, b.y, b.length, b.width, b.angle, pc.x, pc.y, pc.r)) {
        b.alive = false;
        playerHit();
      }
    });
  }

  // Enemies vs player (body collision) — with bounding-box early exit
  if (player.alive && player.invulnTimer <= 0) {
    enemies.forEach(e => {
      if (!e.alive) return;
      const dx = e.x - pc.x;
      const dy = e.y - pc.y;
      if (Math.abs(dx) > 25 || Math.abs(dy) > 25) return;
      const enemyR = e.type === 'turret' ? 12 : e.type === 'zigzag' ? 11 : 10;
      if (circleCollide(e.x, e.y, enemyR, pc.x, pc.y, pc.r)) {
        e.alive = false;
        spawnParticles(e.x, e.y, 12);
        playerHit();
      }
    });
  }
}

function playerHit() {
  player.lives -= 1;
  spawnParticles(player.x, player.y, 20);
  AudioSys.play('explosion');
  if (player.lives <= 0) {
    player.alive = false;
    setTimeout(() => {
      gameState = STATE.GAME_OVER;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('galaga_highscore', highScore);
      }
      AudioSys.play('gameover');
    }, 1000);
  } else {
    player.invulnTimer = CONFIG.player.respawnInvuln;
    player.x = W / 2;
    player.y = H - 80;
  }
}

// ================================================================
//  PARTICLE SYSTEM
// ================================================================
function spawnParticles(x, y, count) {
  if (!CONFIG.toggles.particles) return;
  const colors = CONFIG.colors.particles;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = CONFIG.particles.speedRange[0] + Math.random() * (CONFIG.particles.speedRange[1] -
CONFIG.particles.speedRange[0]);
    const color = colors[Math.floor(Math.random() * colors.length)];
    const life = CONFIG.particles.lifetime * (0.5 + Math.random() * 0.5);
    particles.push(createParticle(
      x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      color,
      life,
      2 + Math.random() * 3
    ));
  }
}

function updateParticles() {
  particles.forEach(p => {
    if (!p.alive) return;
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 1;
    if (p.life <= 0) p.alive = false;
  });
  particles = particles.filter(p => p.alive);
}

/** Initialize the starfield — called once at startup */
function initStars() {
  const sc = CONFIG.stars;
  stars = [];
  for (let i = 0; i < sc.count; i++) {
    const size = sc.minSize + Math.random() * (sc.maxSize - sc.minSize);
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: size,
      // Larger stars scroll faster (parallax depth effect)
      speed: sc.speed + Math.random() * sc.speedVariation * (size / sc.maxSize),
      // Each star gets its own flicker phase and frequency so they never sync
      phase: Math.random() * Math.PI * 2,
      flickerRate: sc.flickerSpeed + Math.random() * sc.flickerVariation,
      // Base brightness — larger stars tend to be brighter
      baseAlpha: sc.minAlpha + Math.random() * (sc.maxAlpha - sc.minAlpha)
    });
  }
}

/** Update star positions — scroll downward and wrap */
function updateStars() {
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    s.y += s.speed;
    s.phase += s.flickerRate;
    // Wrap star back to top when it leaves the bottom
    if (s.y > H + s.size) {
      s.y = -s.size;
      s.x = Math.random() * W;
    }
  }
}

/** Draw the starfield background — optimized for mobile (no per-star save/restore or shadowBlur) */
function drawBackground() {
  c.fillStyle = CONFIG.colors.bg;
  c.fillRect(0, 0, W, H);

  // Draw stars as simple filled rects instead of arcs for performance
  c.fillStyle = '#ffffff';
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    const flicker = Math.sin(s.phase) * 0.5 + 0.5;
    c.globalAlpha = Math.max(0.05, s.baseAlpha * (0.4 + flicker * 0.6));
    c.fillRect(s.x - s.size, s.y - s.size, s.size * 2, s.size * 2);
  }
  c.globalAlpha = 1;
}

/** Draw player — optimized (no shadowBlur, minimal state changes) */
function drawPlayer() {
  if (!player.alive) return;
  if (player.invulnTimer > 0 && Math.floor(player.invulnTimer / 100) % 2 === 0) return;

  const px = player.x;
  const py = player.y;
  const w = player.width;
  const h = player.height;

  // Main ship body — solid white triangle
  c.beginPath();
  c.moveTo(px, py - h / 2);           // nose (top center)
  c.lineTo(px - w / 2, py + h / 2);  // bottom left
  c.lineTo(px + w / 2, py + h / 2);  // bottom right
  c.closePath();
  c.fillStyle = '#ffffff';
  c.fill();

  // Red accent — center line from nose to base
//   c.beginPath();
//   c.moveTo(px, py - h / 2);
//   c.lineTo(px, py + h / 2);
//   c.strokeStyle = '#ff0000';
//   c.lineWidth = 2;
//   c.stroke();

  // Red accent — wing tips (small red triangles at bottom corners)
  const tipSize = 5;
  // Left wing tip
  c.beginPath();
  c.moveTo(px - w / 2, py + h / 2);
  c.lineTo(px - 7 * w / 12 + tipSize, py + h / 2 - 4 * tipSize);
  c.lineTo(px - w / 2 + tipSize, py + h / 2);
  c.closePath();
  c.fillStyle = '#ffffff';
  c.fill();

  // Right wing tip
  c.beginPath();
  c.moveTo(px + w / 2, py + h / 2);
  c.lineTo(px + 7 * w / 12 - tipSize, py + h / 2 - 4 * tipSize);
  c.lineTo(px + w / 2 - tipSize, py + h / 2);
  c.closePath();
  c.fillStyle = '#ffffff';
  c.fill();

  // Red accents
  c.beginPath();
  c.moveTo(px, py - h / 4 + 4);
  c.lineTo(px - 2, py - h / 5 + 10);
  c.lineTo(px + 2, py - h / 5 + 10);
  c.closePath();
  c.fillStyle = '#ff0000';
  c.fill();

}

/** Draw enemies — optimized (no shadowBlur per enemy for mobile performance) */
function drawEnemies() {
  enemies.forEach(e => {
    if (!e.alive) return;
    const color = e.type === 'basic' ? CONFIG.colors.enemyBasic
      : e.type === 'zigzag' ? CONFIG.colors.enemyZigzag
      : CONFIG.colors.enemyTurret;

    c.save();
    if (e.state === 'wrapping' && e.wrapAlpha !== undefined) {
      c.globalAlpha = e.wrapAlpha;
    }
    c.translate(e.x, e.y);
    c.rotate((e.rotation || 0) + (e.type === 'turret' ? Math.PI : 0));
    // Removed shadowBlur for mobile — solid colors are fast and look sharp
    c.strokeStyle = color;
    c.lineWidth = 2;
    c.fillStyle = color + '22';

    // Wing flap animation — oscillates based on global time
    const wingFlap = Math.sin(globalTime * 8 + e.gridX * 0.5 + e.gridY * 0.3) * 0.3;

    if (e.type === 'basic') {
      // ---- Beetle / Firefly bug (Galaga-style) ----
      const basicWingColor = '#ff0000';
      const basicWingStroke = '#cc0000';
      const basicTorsoColor = '#ffffff';
      const basicStripeColor = '#4488ff';
      const basicAntennaColor = '#4488ff';

      // Body — vertical oval, solid white fill
      c.beginPath();
      c.ellipse(0, 0, 5, 8, 0, 0, Math.PI * 2);
      c.fillStyle = basicTorsoColor;
      c.fill();
      c.strokeStyle = '#cccccc';
      c.lineWidth = 1;
      c.stroke();
      c.lineWidth = 2;

      // Two blue horizontal stripes on torso
      c.strokeStyle = basicStripeColor;
      c.lineWidth = 1.5;
      for (let s = -1; s <= 1; s += 2) {
        const sy = s * 2.5;
        const halfW = Math.sqrt(Math.max(0, 25 - (sy * sy) / 64 * 25));
        c.beginPath();
        c.moveTo(-Math.min(halfW, 4.5), sy);
        c.lineTo(Math.min(halfW, 4.5), sy);
        c.stroke();
      }
      c.lineWidth = 2;

      // Wing membrane — left (solid red)
      c.beginPath();
      c.moveTo(-5, -3);
      c.quadraticCurveTo(-13, -5 + wingFlap * 8, -12, 3);
      c.quadraticCurveTo(-8, 1, -5, 3);
      c.closePath();
      c.fillStyle = basicWingColor;
      c.fill();
      c.strokeStyle = basicWingStroke;
      c.stroke();

      // Wing membrane — right (solid red)
      c.beginPath();
      c.moveTo(5, -3);
      c.quadraticCurveTo(13, -5 + wingFlap * 8, 12, 3);
      c.quadraticCurveTo(8, 1, 5, 3);
      c.closePath();
      c.fillStyle = basicWingColor;
      c.fill();
      c.strokeStyle = basicWingStroke;
      c.stroke();

      // Antennae — blue
      c.strokeStyle = basicAntennaColor;
      c.beginPath();
      c.moveTo(-3, -8);
      c.quadraticCurveTo(-7, -15, -9, -13);
      c.moveTo(3, -8);
      c.quadraticCurveTo(7, -15, 9, -13);
      c.stroke();

      // Eyes — two bright dots
      c.fillStyle = '#fff';
      c.beginPath();
      c.arc(-3, -4, 1.8, 0, Math.PI * 2);
      c.arc(3, -4, 1.8, 0, Math.PI * 2);
      c.fill();

      // Legs — three pairs
      c.strokeStyle = color;
      c.lineWidth = 1.2;
      const legSpread = 4;
      for (let i = -1; i <= 1; i++) {
        const ly = i * 3;
        c.beginPath();
        c.moveTo(-5, ly);
        c.lineTo(-5 - legSpread, ly - 2);
        c.lineTo(-5 - legSpread, ly + 2);
        c.moveTo(5, ly);
        c.lineTo(5 + legSpread, ly - 2);
        c.lineTo(5 + legSpread, ly + 2);
        c.stroke();
      }
      c.lineWidth = 1.5;

    } else if (e.type === 'zigzag') {
      // ---- Dragonfly / Moth bug ----
      // Blue wings with solid fill
      const wingColor = '#4488ff';
      const wingStrokeColor = '#2255cc';
      // Yellow/red striped torso with solid fill
      const torsoColor = '#ffcc00';
      const stripeColor = '#ff3333';
      const eyeColor = '#ff0000';

      // Body — elongated oval with yellow fill
      c.beginPath();
      c.ellipse(0, 0, 4, 9, 0, 0, Math.PI * 2);
      c.fillStyle = torsoColor;
      c.fill();
      c.strokeStyle = '#cc9900';
      c.lineWidth = 1;
      c.stroke();
      c.lineWidth = 2;

      // Red stripes on torso — horizontal bands
      c.strokeStyle = stripeColor;
      c.lineWidth = 1.5;
      for (let s = -2; s <= 2; s++) {
        const sy = s * 3.5;
        const halfW = Math.sqrt(Math.max(0, 16 - (sy * sy) / (9 * 9) * 16));
        c.beginPath();
        c.moveTo(-Math.min(halfW, 3.5), sy);
        c.lineTo(Math.min(halfW, 3.5), sy);
        c.stroke();
      }
      c.lineWidth = 2;

      // Wings — long and sweeping, left (solid blue)
      c.beginPath();
      c.moveTo(-4, -4);
      c.quadraticCurveTo(-18, -10 + wingFlap * 10, -17, -1);
      c.quadraticCurveTo(-10, 0, -4, 1);
      c.closePath();
      c.fillStyle = wingColor;
      c.fill();
      c.strokeStyle = wingStrokeColor;
      c.stroke();

      // Wings — long and sweeping, right (solid blue)
      c.beginPath();
      c.moveTo(4, -4);
      c.quadraticCurveTo(18, -10 + wingFlap * 10, 17, -1);
      c.quadraticCurveTo(10, 0, 4, 1);
      c.closePath();
      c.fillStyle = wingColor;
      c.fill();
      c.strokeStyle = wingStrokeColor;
      c.stroke();

      // Lower wings — left (solid blue)
      c.beginPath();
      c.moveTo(-4, 1);
      c.quadraticCurveTo(-14, 4 + wingFlap * 7, -13, 9);
      c.quadraticCurveTo(-8, 7, -4, 4);
      c.closePath();
      c.fillStyle = wingColor;
      c.fill();
      c.strokeStyle = wingStrokeColor;
      c.stroke();

      // Lower wings — right (solid blue)
      c.beginPath();
      c.moveTo(4, 1);
      c.quadraticCurveTo(14, 4 + wingFlap * 7, 13, 9);
      c.quadraticCurveTo(8, 7, 4, 4);
      c.closePath();
      c.fillStyle = wingColor;
      c.fill();
      c.strokeStyle = wingStrokeColor;
      c.stroke();

      // Antennae — curved
      c.beginPath();
      c.strokeStyle = color;
      c.moveTo(-2, -9);
      c.quadraticCurveTo(-5, -16, -8, -14);
      c.moveTo(2, -9);
      c.quadraticCurveTo(5, -16, 8, -14);
      c.stroke();

      // Eyes — red
      c.fillStyle = eyeColor;
      c.beginPath();
      c.arc(-2, -5, 2, 0, Math.PI * 2);
      c.arc(2, -5, 2, 0, Math.PI * 2);
      c.fill();

      // Legs — three pairs, thinner
      c.strokeStyle = color;
      c.lineWidth = 1.2;
      for (let i = -1; i <= 1; i++) {
        const ly = i * 3;
        c.beginPath();
        c.moveTo(-4, ly);
        c.lineTo(-9, ly - 3);
        c.lineTo(-9, ly + 3);
        c.moveTo(4, ly);
        c.lineTo(9, ly - 3);
        c.lineTo(9, ly + 3);
        c.stroke();
      }
      c.lineWidth = 1.5;

    } else if (e.type === 'turret') {
      // ---- Armored beetle / Scarab bug ----
      // Green outline/wings when full HP, blue when hit once
      const turretOutlineColor = e.hp < e.maxHp ? '#4488ff' : '#00cc44';
      const turretWingColor = e.hp < e.maxHp ? '#4488ff' : '#00cc44';
      const turretWingStroke = e.hp < e.maxHp ? '#2255cc' : '#009933';
      const turretFill = '#ffcc00';
      const turretAntennaColor = '#ff0000';

      // Body — wider, armored oval, solid yellow fill
      c.beginPath();
      c.ellipse(0, 0, 8, 9, 0, 0, Math.PI * 2);
      c.fillStyle = turretFill;
      c.fill();
      c.strokeStyle = turretOutlineColor;
      c.lineWidth = 2;
      c.stroke();

      // Shell ridge down the middle
      c.beginPath();
      c.strokeStyle = turretOutlineColor;
      c.moveTo(0, -9);
      c.lineTo(0, 9);
      c.stroke();

      // Wings — broad and shield-like, left (solid green/blue)
      c.beginPath();
      c.moveTo(-8, -4);
      c.quadraticCurveTo(-16, -8 + wingFlap * 5, -14, 4);
      c.quadraticCurveTo(-11, 3, -8, 4);
      c.closePath();
      c.fillStyle = turretWingColor;
      c.fill();
      c.strokeStyle = turretWingStroke;
      c.stroke();

      // Wings — broad and shield-like, right (solid green/blue)
      c.beginPath();
      c.moveTo(8, -4);
      c.quadraticCurveTo(16, -8 + wingFlap * 5, 14, 4);
      c.quadraticCurveTo(11, 3, 8, 4);
      c.closePath();
      c.fillStyle = turretWingColor;
      c.fill();
      c.strokeStyle = turretWingStroke;
      c.stroke();

      // Mandibles — pincers at bottom
      c.strokeStyle = turretOutlineColor;
      c.beginPath();
      c.moveTo(-3, 9);
      c.quadraticCurveTo(-6, 14, -4, 16);
      c.moveTo(3, 9);
      c.quadraticCurveTo(6, 14, 4, 16);
      c.stroke();

      // Antennae — short and thick, red
      c.strokeStyle = turretAntennaColor;
      c.beginPath();
      c.moveTo(-3, -9);
      c.quadraticCurveTo(-8, -14, -5, -16);
      c.moveTo(3, -9);
      c.quadraticCurveTo(8, -14, 5, -16);
      c.stroke();

      // Legs — three pairs, thicker (armored)
      c.strokeStyle = turretOutlineColor;
      c.lineWidth = 1.5;
      for (let i = -1; i <= 1; i++) {
        const ly = i * 4;
        c.beginPath();
        c.moveTo(-8, ly);
        c.lineTo(-13, ly - 3);
        c.lineTo(-13, ly + 3);
        c.moveTo(8, ly);
        c.lineTo(13, ly - 3);
        c.lineTo(13, ly + 3);
        c.stroke();
      }
      c.lineWidth = 1.5;
    }

    c.restore();
  });
}

/** Draw bullets — optimized (no shadowBlur, batched by type) */
function drawBullets() {
  // Batch player and enemy bullets separately to minimize state changes
  const playerColor = CONFIG.colors.playerBullet;
  const enemyColor = CONFIG.colors.enemyBullet;

  bullets.forEach(b => {
    if (!b.alive) return;
    c.save();
    c.fillStyle = b.type === 'player' ? playerColor : enemyColor;
    c.translate(b.x, b.y);
    c.rotate(b.angle);
    c.fillRect(-b.length / 2, -b.width / 2, b.length, b.width);
    c.restore();
  });
}

/** Draw particles — optimized (no shadowBlur, minimal state changes) */
function drawParticles() {
  if (!CONFIG.toggles.particles) return;
  particles.forEach(p => {
    if (!p.alive) return;
    const alpha = Math.max(0, p.life / p.maxLife);
    c.globalAlpha = alpha;
    c.fillStyle = p.color;
    const size = p.size * alpha;
    c.fillRect(p.x - size / 2, p.y - size / 2, size, size);
  });
  c.globalAlpha = 1;
}

/** Draw HUD — score, lives, wave */
function drawHUD() {
  c.save();
  c.fillStyle = CONFIG.colors.accent;
  c.font = 'bold 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.textAlign = 'left';
  // Removed shadowBlur for mobile performance

  c.fillText(`SCORE ${score}`, 16, 30);
  c.textAlign = 'right';
  c.fillText(`WAVE ${waveManager.wave}`, W - 16, 30);

  if (CONFIG.toggles.highScore) {
    c.textAlign = 'center';
    c.fillText(`HI ${highScore}`, W / 2, 30);
  }

  // Lives as small triangles
  c.textAlign = 'left';
  for (let i = 0; i < player.lives; i++) {
    const lx = 16 + i * 22;
    const ly = 50;
    c.beginPath();
    c.moveTo(lx, ly - 6);
    c.lineTo(lx - 6, ly + 4);
    c.lineTo(lx + 6, ly + 4);
    c.closePath();
    c.strokeStyle = CONFIG.colors.accent;
    c.lineWidth = 1.5;
    c.stroke();
  }

  c.restore();
}

  // Controls info
  c.fillStyle = '#555';
  c.font = '13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.fillText('Arrow keys / WASD to move', W / 2, H * 0.75);
  c.fillText('Space to shoot  •  P to pause', W / 2, H * 0.8);

  c.restore();
}

/** Draw PAUSED overlay */
function drawPaused() {
  c.save();
  c.fillStyle = 'rgba(0,0,0,0.6)';
  c.fillRect(0, 0, W, H);

  c.textAlign = 'center';
  c.fillStyle = CONFIG.colors.accent;
  c.font = 'bold 36px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.fillText('PAUSED', W / 2, H / 2);

  c.font = '16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.fillStyle = '#888';
  c.fillText('Press P or ESC to resume', W / 2, H / 2 + 40);
  c.restore();
}

/** Draw GAME OVER screen */
function drawGameOver() {
  drawBackground();

  // Still draw remaining entities behind the overlay
  drawEnemies();
  drawParticles();
  drawBullets();
  drawPlayer();

  c.save();
  c.fillStyle = 'rgba(0,0,0,0.55)';
  c.fillRect(0, 0, W, H);

  c.textAlign = 'center';
  c.fillStyle = CONFIG.colors.enemyBasic;
  c.font = 'bold 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.fillText('GAME OVER', W / 2, H * 0.35);

  c.fillStyle = CONFIG.colors.accent;
  c.font = 'bold 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.fillText(`Score: ${score}`, W / 2, H * 0.5);

  if (score >= highScore && score > 0) {
    c.fillStyle = '#f5a623';
    c.font = 'bold 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    c.fillText('★ NEW HIGH SCORE ★', W / 2, H * 0.58);
  }

  if (CONFIG.toggles.highScore) {
    c.fillStyle = '#888';
    c.font = '16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    c.fillText(`High Score: ${highScore}`, W / 2, H * 0.66);
  }

  c.fillStyle = '#666';
  c.font = '16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.fillText('Press SPACE or tap to retry', W / 2, H * 0.8);
  c.restore();
}

// ================================================================
//  GAME INITIALIZATION
// ================================================================
function startGame() {
  gameState = STATE.PLAYING;
  score = 0;
  player = createPlayer();
  bullets = [];
  enemies = [];
  particles = [];
  waveManager = createWaveManager();
  spawnWave(waveManager);
  globalTime = 0;
  lastShotTime = 0;
  // Reset dive/idle sound state
  idleSoundPlaying = false;
  idleSoundReady = false;
  AudioSys.stop('idle');
  AudioSys.stop('dive');
}

// ================================================================
//  MAIN GAME LOOP — 60fps via requestAnimationFrame
// ================================================================
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  // Delta time in seconds (capped to avoid spiral of death)
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  if (gameState === STATE.MENU) {
    updateStars();
    drawMenu();
    return;
  }

  if (gameState === STATE.GAME_OVER) {
    updateStars();
    drawGameOver();
    updateParticles();
    return;
  }

  if (gameState === STATE.PAUSED) {
    updateStars();
    // Still render the game underneath
    drawBackground();
    drawEnemies();
    drawBullets();
    drawPlayer();
    drawParticles();
    drawHUD();
    drawPaused();
    return;
  }

  // ---- PLAYING STATE ----
  globalTime += dt;

  // --- Player movement ---
  if (player.alive) {
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= CONFIG.player.speed;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += CONFIG.player.speed;
    // Vertical movement disabled — player stays at fixed Y
    clampPlayer();

    // Invulnerability timer
    if (player.invulnTimer > 0) player.invulnTimer -= dt * 1000;

    // Shooting — limited by number of player bullets on screen (priority) and per-shot cooldown
    if (shootPressed) {
      const playerBulletCount = bullets.filter(b => b.alive && b.type === 'player').length;
      const timeSinceLastShot = globalTime * 1000 - lastShotTime;
      if (playerBulletCount < CONFIG.player.maxPlayerBullets && timeSinceLastShot >= CONFIG.player.shotCooldown) {
        bullets.push(createBullet(
          player.x,
          player.y - player.height / 2,
          0,
          -CONFIG.bullets.playerSpeed,
          'player'
        ));
        AudioSys.play('shoot');
        lastShotTime = globalTime * 1000;
      }
    }
  }

  // --- Update bullets ---
  bullets.forEach(b => {
    if (!b.alive) return;
    b.x += b.vx;
    b.y += b.vy;
    // Remove bullets that leave the canvas
    if (b.y < -20 || b.y > H + 20 || b.x < -20 || b.x > W + 20) {
      b.alive = false;
    }
  });
  bullets = bullets.filter(b => b.alive);

  // --- Enemy formation & diving ---
  updateFormationPositions();
  tryTriggerDive(dt);
  updateDivingEnemies();
  updateWrappingEnemies();
  updateReturningEnemies();
  updateFormationShooting();

  // --- Wave progression ---
  const aliveEnemies = enemies.filter(e => e.alive).length;
  if (aliveEnemies === 0) {
    if (!waveManager.waveComplete) {
      waveManager.waveComplete = true;
      AudioSys.play('levelUp');
      waveManager.timer = 0;
    }
    // Pause between waves, then spawn the next one
    waveManager.timer++;
    if (waveManager.timer > 90) { // ~1.5 second pause between waves
      waveManager.wave++;
      if (waveManager.wave > CONFIG.difficulty.maxWave) {
        // Max wave reached — loop back with higher difficulty
        waveManager.wave = 1;
      }
      waveManager.waveComplete = false;
      waveManager.timer = 0;
      spawnWave(waveManager);
    }
  }

  // --- Collisions ---
  checkCollisions();

  // --- Stars ---
  updateStars();

  // --- Particles ---
  updateParticles();

  // --- Render ---
  drawBackground();
  drawEnemies();
  drawBullets();
  drawPlayer();
  drawParticles();
  drawHUD();
}

// ================================================================
//  BOOTSTRAP — Start the loop
// ================================================================
(function boot() {
  initStars();
  requestAnimationFrame(gameLoop);
})();
</script>
