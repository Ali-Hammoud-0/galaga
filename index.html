<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Galaga Clone</title>

<!--
  ╔══════════════════════════════════════════════════════════╗
  ║              GALAGA CLONE — README                       ║
  ╠══════════════════════════════════════════════════════════╣
  ║                                                          ║
  ║  AUDIO FILES:                                            ║
  ║  Place .wav files in a "sounds/" folder next to this     ║
  ║  file. Expected filenames (configurable in CONFIG.audio): ║
  ║    - sounds/shoot.wav       (player fires)               ║
  ║    - sounds/hit.wav         (enemy hit)                  ║
  ║    - sounds/explosion.wav   (enemy destroyed)            ║
  ║    - sounds/levelup.wav     (wave cleared)               ║
  ║    - sounds/gameover.wav    (game over)                  ║
  ║  Audio gracefully degrades if files are missing.         ║
  ║                                                          ║
  ║  CONFIG TWEAKING:                                        ║
  ║  All tunable values live in the CONFIG object at the     ║
  ║  top of the <script> block. Adjust:                      ║
  ║    - colors for theming                                  ║
  ║    - player.speed for movement responsiveness            ║
  ║    - player.shotCooldown for delay between shots (ms)    ║
  ║    - difficulty.* for game balance                       ║
  ║    - toggles.* to enable/disable features                ║
  ║                                                          ║
  ║  TOUCH INPUT:                                            ║
  ║    - Drag anywhere on canvas to move player proportionally║
  ║    - Tap/click to shoot (ignores drag state)             ║
  ║    - Double-tap top-center area to pause/resume          ║
  ║    - Multi-touch supported (primary finger moves,        ║
  ║      secondary taps fire)                                ║
  ║                                                          ║
  ║  CONTROLS:                                               ║
  ║    - Arrow keys / WASD: move                             ║
  ║    - Space: shoot (hold for auto-fire)                   ║
  ║    - P / ESC: pause/resume                               ║
  ╚══════════════════════════════════════════════════════════╝
-->

<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  canvas {
    display: block;
    object-fit: contain;
    margin: auto;
    image-rendering: auto;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
// ================================================================
//  CONFIG — Centralized game parameters. Change here only.
// ================================================================
const CONFIG = {
  canvas: { width: 480, height: 800, scaleToFit: true },
  colors: {
    bg: '#020208',
    player: '#00f0ff',
    playerBullet: '#00f0ff',
    enemyBasic: '#ff4a6d',
    enemyZigzag: '#f5a623',
    enemyTurret: '#b088f9',
    enemyBullet: '#ff4a6d',
    particles: ['#ffffff', '#00f0ff', '#ff4a6d', '#f5a623'],
    accent: '#00f0ff'
  },
  player: { speed: 5, lives: 3, maxPlayerBullets: 2, respawnInvuln: 3000, shotCooldown: 200 },
  bullets: {
    playerSpeed: 15,
    enemySpeed: 12,
    // Bullet line dimensions (pixels)
    playerLength: 16,
    playerWidth: 3,
    enemyLength: 12,
    enemyWidth: 4
  },
  enemies: {
    formationSpeed: 0.03,
    diveFrequency: 0.008,
    returnSpeed: 3,
    health: { basic: 1, zigzag: 2, turret: 3 },
    shootChance: { basic: 0.02, zigzag: 0.03, turret: 0.08 },
    // Dive path configuration — Galaga-style curved dives with U-turns
    dive: {
      curveRadius: 80,         // radius of U-turn arcs (pixels)
      diveSpeed: 220,          // travel speed along path (pixels/sec)
      diveDepth: 0.88          // how far down the enemy dives (0..1 fraction of canvas height)
    }
  },
  particles: { countOnDeath: 18, speedRange: [1, 4], lifetime: 40, fadeRate: 0.025 },
  stars: {
    count: 200,              // total number of stars in the field
    speed: 0.5,              // base downward scroll speed (pixels per frame)
    speedVariation: 1.5,     // additional random speed per star (0..value)
    minSize: 0.5,            // smallest star radius
    maxSize: 2.5,            // largest star radius
    flickerSpeed: 0.06,      // base flicker frequency multiplier
    flickerVariation: 0.08,  // per-star flicker randomness
    minAlpha: 0.15,          // dimmest star brightness
    maxAlpha: 1.0            // brightest star brightness
  },
  audio: {
    shoot: 'sounds/shoot.wav',
    hit: 'sounds/hit.wav',
    explosion: 'sounds/explosion.wav',
    levelUp: 'sounds/levelup.wav',
    gameOver: 'sounds/gameover.wav',
    volume: 0.6,
    enabled: true
  },
  toggles: { particles: true, highScore: true, mobileControls: true },
  difficulty: { scorePerKill: 100, wavesToProgress: 3, maxWave: 20 }
};

// ================================================================
//  AUDIO SYSTEM — Web Audio API with silent fallback
// ================================================================
const AudioSys = (() => {
  let ctx = null;
  const buffers = {};

  /** Initialize AudioContext on first user gesture (browser policy) */
  function init() {
    if (ctx) return;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      // Audio not supported — game continues silently
      return;
    }
    // Preload all audio files now that context is ready
    if (CONFIG.audio.enabled) {
      Object.keys(CONFIG.audio)
        .filter(k => k !== 'volume' && k !== 'enabled')
        .forEach(key => preload(CONFIG.audio[key]));
    }
  }

  /** Preload a WAV file and cache its decoded buffer */
  function preload(url) {
    if (!CONFIG.audio.enabled || !ctx) return Promise.resolve(null);
    if (buffers[url]) return Promise.resolve(buffers[url]);
    return fetch(url)
      .then(r => r.arrayBuffer())
      .then(ab => ctx.decodeAudioData(ab))
      .then(buf => { buffers[url] = buf; return buf; })
      .catch(() => { buffers[url] = null; return null; }); // Silent fallback
  }

  /** Play a preloaded sound buffer */
  function play(soundKey) {
    if (!CONFIG.audio.enabled || !ctx) return;
    const url = CONFIG.audio[soundKey];
    if (!url) return;
    const buf = buffers[url];
    if (!buf) return;
    try {
      const source = ctx.createBufferSource();
      source.buffer = buf;
      const gain = ctx.createGain();
      gain.gain.value = CONFIG.audio.volume;
      source.connect(gain);
      gain.connect(ctx.destination);
      source.start(0);
    } catch (e) { /* degrade silently */ }
  }

  return { init, preload, play };
})();

// ================================================================
//  CANVAS SETUP — Responsive, maintains 3:2 aspect ratio
// ================================================================
const canvas = document.getElementById('gameCanvas');
const c = canvas.getContext('2d');
const W = CONFIG.canvas.width;
const H = CONFIG.canvas.height;

canvas.width = W;
canvas.height = H;

/** Scale canvas to fit the viewport while preserving aspect ratio */
function resizeCanvas() {
  if (!CONFIG.canvas.scaleToFit) return;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const scale = Math.min(vw / W, vh / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

/** Convert screen/touch coordinates to canvas logical coordinates */
function toCanvasX(clientX) {
  const rect = canvas.getBoundingClientRect();
  return ((clientX - rect.left) / rect.width) * W;
}
function toCanvasY(clientY) {
  const rect = canvas.getBoundingClientRect();
  return ((clientY - rect.top) / rect.height) * H;
}

// ================================================================
//  STATE MACHINE
// ================================================================
const STATE = { MENU: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };
let gameState = STATE.MENU;

// ================================================================
//  INPUT SYSTEM — Keyboard + Touch/Mouse
// ================================================================
const keys = {};
let touchState = { active: false, startX: 0, startY: 0, lastX: 0, lastY: 0 };
let shootPressed = false;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); shootPressed = true; }
  if (e.code === 'KeyP' || e.code === 'Escape') {
    if (gameState === STATE.PLAYING) gameState = STATE.PAUSED;
    else if (gameState === STATE.PAUSED) gameState = STATE.PLAYING;
  }
  // Start game on Space or Enter from menu/gameover
  if (gameState === STATE.MENU || gameState === STATE.GAME_OVER) {
    if (e.code === 'Space' || e.code === 'Enter') {
      AudioSys.init();
      startGame();
    }
  }
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'Space') shootPressed = false;
});

// Touch handling
canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('mousedown', handleMouseDown);
canvas.addEventListener('mouseup', handleMouseUp);
canvas.addEventListener('mousemove', handleMouseMove);

let mouseDown = false;
let mouseTouchState = null;

function handleMouseDown(e) {
  AudioSys.init();
  if (gameState === STATE.MENU || gameState === STATE.GAME_OVER) { startGame(); return; }
  if (gameState === STATE.PAUSED) { gameState = STATE.PLAYING; return; }
  mouseDown = true;
  const cx = toCanvasX(e.clientX);
  const cy = toCanvasY(e.clientY);
  mouseTouchState = { active: true, lastX: cx, lastY: cy };
  shootPressed = true;
  // Double-tap pause zone: top-center
  if (cy < 80) togglePauseTouch();
}

function handleMouseUp() {
  mouseDown = false;
  mouseTouchState = null;
  shootPressed = false;
}

function handleMouseMove(e) {
  if (!mouseDown || !mouseTouchState || gameState !== STATE.PLAYING) return;
  const cx = toCanvasX(e.clientX);
  const cy = toCanvasY(e.clientY);
  if (player) {
    player.x += (cx - mouseTouchState.lastX);
    // Vertical movement disabled
    clampPlayer();
  }
  mouseTouchState.lastX = cx;
  mouseTouchState.lastY = cy;
}

function handleTouchStart(e) {
  e.preventDefault();
  AudioSys.init();
  if (gameState === STATE.MENU || gameState === STATE.GAME_OVER) { startGame(); return; }
  // Double-tap detection for pause
  const now = Date.now();
  if (e.touches.length > 0) {
    const ty = toCanvasY(e.touches[0].clientY);
    if (ty < 80 && now - lastTapTime < 300) { togglePauseTouch(); }
    lastTapTime = now;
  }
  touchState.active = true;
  const first = e.touches[0];
  touchState.startX = toCanvasX(first.clientX);
  touchState.startY = toCanvasY(first.clientY);
  touchState.lastX = touchState.startX;
  touchState.lastY = touchState.startY;
  shootPressed = true;
}

function handleTouchMove(e) {
  e.preventDefault();
  if (!touchState.active || gameState !== STATE.PLAYING || !player) return;
  const first = e.touches[0];
  const cx = toCanvasX(first.clientX);
  const cy = toCanvasY(first.clientY);
  player.x += (cx - touchState.lastX);
  // Vertical movement disabled
  clampPlayer();
  touchState.lastX = cx;
  touchState.lastY = cy;
  // Additional touches fire
  if (e.touches.length > 1) shootPressed = true;
}

function handleTouchEnd(e) {
  e.preventDefault();
  touchState.active = false;
  if (e.touches.length === 0) shootPressed = false;
  else shootPressed = true; // Keep firing if other fingers down
}

let lastTapTime = 0;
function togglePauseTouch() {
  if (gameState === STATE.PLAYING) gameState = STATE.PAUSED;
  else if (gameState === STATE.PAUSED) gameState = STATE.PLAYING;
}

// ================================================================
//  GAME ENTITIES
// ================================================================
let player = null;
let bullets = [];
let enemies = [];
let particles = [];
let stars = [];
let waveManager = null;
let score = 0;
let highScore = parseInt(localStorage.getItem('galaga_highscore')) || 0;
let lastTime = 0;
let globalTime = 0;
let lastShotTime = 0;

// --- Player ---
function createPlayer() {
  return {
    x: W / 2,
    y: H - 80,
    width: 28,
    height: 32,
    lives: CONFIG.player.lives,
    invulnTimer: 0,
    alive: true
  };
}

function clampPlayer() {
  if (!player) return;
  player.x = Math.max(player.width / 2, Math.min(W - player.width / 2, player.x));
  player.y = Math.max(player.height / 2, Math.min(H - player.height / 2, player.y));
}

// --- Bullet ---
function createBullet(x, y, vx, vy, type) {
  const len = type === 'player' ? CONFIG.bullets.playerLength : CONFIG.bullets.enemyLength;
  const w = type === 'player' ? CONFIG.bullets.playerWidth : CONFIG.bullets.enemyWidth;
  // Angle of travel (used to orient the bullet line)
  const angle = Math.atan2(vy, vx);
  return { x, y, vx, vy, type, length: len, width: w, angle, alive: true };
}

// --- Enemy ---
function createEnemy(type, gridX, gridY, formationX, formationY) {
  const hpMap = CONFIG.enemies.health;
  return {
    type, // 'basic', 'zigzag', 'turret'
    x: formationX,
    y: formationY,
    gridX,
    gridY,
    hp: hpMap[type] || 1,
    maxHp: hpMap[type] || 1,
    state: 'formation', // 'formation', 'diving'
    diveTimer: 0,
    divePhase: 0,
    alive: true,
    shootTimer: Math.random() * 100,
    // Rotation (radians) — 0 = upright in formation
    rotation: 0,
    // For Galaga-style dive: segment-based path
    diveStartTime: 0,
    diveStartX: formationX,
    diveStartY: formationY,
    diveDirection: (Math.random() < 0.5) ? -1 : 1, // top U-turn direction
    divePath: null, // { segments, totalLength }
    // For return
    targetX: formationX,
    targetY: formationY
  };
}

// --- Particle ---
function createParticle(x, y, vx, vy, color, life, size) {
  return { x, y, vx, vy, color, life, maxLife: life, size, alive: true };
}

// ================================================================
//  WAVE MANAGER — Spawns enemies, tracks progression
// ================================================================
function createWaveManager() {
  return {
    wave: 1,
    enemiesSpawned: 0,
    enemiesInWave: 0,
    waveComplete: false,
    timer: 0,
    spawnPhase: 0
  };
}

/** Get the grid dimensions for the current wave */
function getWaveLayout(wave) {
  const cols = Math.min(8, 5 + Math.floor(wave / 3));
  const rows = Math.min(5, 2 + Math.floor(wave / 4));
  return { cols, rows };
}

/** Difficulty multiplier that scales with wave number */
function getDifficultyMultiplier(wave) {
  return 1 + (wave - 1) * 0.15;  // 15% harder per wave
}

/** Spawn a full wave of enemies in grid formation */
function spawnWave(wm) {
  const { cols, rows } = getWaveLayout(wm.wave);
  const spacingX = (W - 80) / (cols + 1);
  const spacingY = 70;
  const startY = 60;
  const difficulty = getDifficultyMultiplier(wm.wave);

  enemies = [];

  for (let r = 0; r < rows; r++) {
    for (let col = 0; col < cols; col++) {
      let type = 'basic';
      // Introduce harder enemies more frequently as waves progress
      const roll = Math.random();
      const turretChance = Math.min(0.5, 0.10 + wm.wave * 0.04);
      const zigzagChance = Math.min(0.6, 0.25 + wm.wave * 0.05);
      if (roll < turretChance) type = 'turret';
      else if (roll < turretChance + zigzagChance) type = 'zigzag';

      const fx = 40 + col * spacingX + spacingX / 2;
      const fy = startY + r * spacingY;
      const enemy = createEnemy(type, col, r, fx, fy);
      // Scale HP with difficulty
      enemy.hp = Math.ceil(enemy.hp * difficulty);
      enemy.maxHp = enemy.hp;
      enemies.push(enemy);
    }
  }

  wm.enemiesInWave = enemies.length;
  wm.enemiesSpawned = 0;
  wm.waveComplete = false;
}

// ================================================================
//  FORMATION SWAY & DIVE SYSTEM
// ================================================================

/**
 * Formation sway: enemies oscillate horizontally as a group.
 * Uses Math.sin(globalTime * CONFIG.enemies.formationSpeed) for smooth
 * sinusoidal movement. Each row can have a slight phase offset for
 * a more organic feel.
 */
function updateFormationPositions() {
  const swayAmount = 30;
  const swayPhase = Math.sin(globalTime * CONFIG.enemies.formationSpeed);

  enemies.forEach(e => {
    if (e.state !== 'formation') return;
    // Row-based phase offset: upper rows sway slightly differently
    const rowOffset = e.gridY * 0.3;
    const targetX = e.targetX + swayAmount * swayPhase * (1 + rowOffset * 0.1);
    const targetY = e.targetY;
    // Smoothly interpolate toward sway-adjusted target to prevent snapping
    // when enemies transition from 'returning' to 'formation'
    e.x += (targetX - e.x) * 0.15;
    e.y += (targetY - e.y) * 0.15;
  });
}

/**
 * Galaga-style dive system — segment-based path with U-turns.
 *
 * Each dive is built from 7 segments:
 *   1) Top U-turn: semicircle that starts upright, curves up-left/up-right,
 *      and ends facing downward along the dive line.
 *   2) Straight descent to mid-screen: travels toward the player's
 *      initially anticipated position.
 *   3-4) Mid-screen S-curve: two quarter-circle arcs that shift the enemy
 *      laterally toward a newly recalculated player position while keeping
 *      the enemy moving downward the entire time.
 *   5) Straight descent to final target: continues toward the bottom.
 *   6) Bottom U-turn: semicircle that curves from the dive line into
 *      the ascent line back toward formation.
 *   7) Straight ascent: travels back toward the formation position.
 *
 * Rotation is always derived from the movement tangent so the enemy
 * faces its direction of travel. As the enemy nears the grid on the
 * ascent, rotation smoothly interpolates back to 0 (upright).
 */

/**
 * Build a segment-based dive path for the given enemy.
 *
 * Path structure (7 segments):
 *   1) Top U-turn: semicircle — starts upright, curves up-left/up-right,
 *      ends facing straight down.
 *   2) Straight descent to mid-screen: from U-turn exit toward the
 *      player's initially anticipated position at ~45% canvas height.
 *   3) S-curve arc A: quarter-circle — turns from facing-down to
 *      facing-sideways (left or right depending on new target).
 *   4) S-curve arc B: quarter-circle — turns from facing-sideways
 *      back to facing-down, completing the lateral shift.
 *   5) Straight descent to final target: from S-curve exit to the
 *      bottom of the dive.
 *   6) Bottom U-turn: semicircle — starts facing down, curves up,
 *      ends facing straight up.
 *   7) Straight ascent: from U-turn exit back to formation.
 *
 * Arc segments store: { cx, cy, radius, startAngle, endAngle, isCW }
 *   - CW arc tangent:  angle + PI/2
 *   - CCW arc tangent: angle - PI/2
 *
 * Line segments store: { fromX, fromY, toX, toY }
 *
 * Total arc+line lengths determine travel time at a fixed speed.
 */
function buildDivePath(enemy) {
  const R = CONFIG.enemies.dive.curveRadius;
  const dir = enemy.diveDirection; // -1 = curve left, +1 = curve right
  const startX = enemy.diveStartX;
  const startY = enemy.diveStartY;
  const bottomY = H * CONFIG.enemies.dive.diveDepth;

  // --- Mid-screen Y threshold: where the enemy recalculates target ---
  const midScreenY = H * 0.45;

  // --- Initial target: player's anticipated position at mid-screen ---
  const midTargetX = Math.max(30, Math.min(W - 30, player.x + (Math.random() - 0.5) * 80));

  // =====================
  // Segment 1: Top U-turn (semicircle, sweep = PI)
  // Starts facing up (-PI/2), ends facing down (PI/2)
  // =====================
  let topArc;
  if (dir === 1) {
    // CW arc — center to the RIGHT of start
    const cx = startX + R;
    const cy = startY;
    // startAngle = -PI → point = (cx - R, cy) = (startX, startY) ✓
    // tangent at -PI = -PI + PI/2 = -PI/2 (up) ✓
    // endAngle = 0 → point = (cx + R, cy) = (startX + 2R, startY)
    // tangent at 0 = 0 + PI/2 = PI/2 (down) ✓
    topArc = {
      type: 'arc', cx, cy, radius: R,
      startAngle: -Math.PI, endAngle: 0, isCW: true,
      length: R * Math.PI
    };
  } else {
    // CCW arc — center to the LEFT of start
    const cx = startX - R;
    const cy = startY;
    // startAngle = 0 → point = (cx + R, cy) = (startX, startY) ✓
    // tangent at 0 = 0 - PI/2 = -PI/2 (up) ✓
    // endAngle = -PI → point = (cx - R, cy) = (startX - 2R, startY)
    // tangent at -PI = -PI - PI/2 = -3PI/2 = PI/2 (down) ✓
    topArc = {
      type: 'arc', cx, cy, radius: R,
      startAngle: 0, endAngle: -Math.PI, isCW: false,
      length: R * Math.PI
    };
  }
  const topExitX = topArc.cx + topArc.radius * Math.cos(topArc.endAngle);
  const topExitY = topArc.cy + topArc.radius * Math.sin(topArc.endAngle);

  // =====================
  // Segment 2: Straight descent to mid-screen
  // From top U-turn exit toward the initial anticipated player position at mid-screen Y
  // =====================
  const midDx = midTargetX - topExitX;
  const midDy = midScreenY - topExitY;
  const midLength = Math.sqrt(midDx * midDx + midDy * midDy);
  const midLine = {
    type: 'line',
    fromX: topExitX, fromY: topExitY,
    toX: midTargetX, toY: midScreenY,
    length: midLength
  };

  // --- At mid-screen: recalculate player's anticipated position for the final dive target ---
  const finalTargetX = Math.max(30, Math.min(W - 30, player.x + (Math.random() - 0.5) * 100));
  const finalTargetY = bottomY;

  // =====================
  // Segments 3 & 4: Mid-screen S-curve (two quarter-circle arcs)
  // Enemy is facing down at mid-screen. The S-curve shifts the enemy laterally
  // toward the new target while keeping it moving DOWNWARD the entire time.
  //   Arc A: quarter-circle from facing-down to facing-sideways
  //   Arc B: quarter-circle from facing-sideways back to facing-down
  // Total lateral shift = 2R, total vertical drop = 2R.
  // =====================
  const midCurveDir = (finalTargetX >= midTargetX) ? 1 : -1;

  let arcA, arcB;
  if (midCurveDir === 1) {
    // --- Curve RIGHT ---
    // Arc A (CCW): down → right
    //   tangent = angle - PI/2
    //   start: tangent=PI/2 (down) → angle=PI, point=(cx-R, cy)=(midTargetX, midScreenY)
    //   end:   tangent=0 (right)  → angle=PI/2, point=(cx, cy+R)=(midTargetX+R, midScreenY+R)
    arcA = {
      type: 'arc',
      cx: midTargetX + R, cy: midScreenY, radius: R,
      startAngle: Math.PI, endAngle: Math.PI / 2, isCW: false,
      length: R * Math.PI / 2,
      rotationBlend: 0.6  // blend 60% toward downward-facing to reduce tilt
    };
    // Arc B (CW): right → down
    //   tangent = angle + PI/2
    //   start: tangent=0 (right)  → angle=-PI/2, point=(cx, cy-R)=(midTargetX+R, midScreenY+R)
    //   end:   tangent=PI/2 (down) → angle=0, point=(cx+R, cy)=(midTargetX+2R, midScreenY+2R)
    arcB = {
      type: 'arc',
      cx: midTargetX + R, cy: midScreenY + 2 * R, radius: R,
      startAngle: -Math.PI / 2, endAngle: 0, isCW: true,
      length: R * Math.PI / 2,
      rotationBlend: 0.6  // blend 60% toward downward-facing to reduce tilt
    };
  } else {
    // --- Curve LEFT ---
    // Arc A (CW): down → left
    //   tangent = angle + PI/2
    //   start: tangent=PI/2 (down) → angle=0, point=(cx+R, cy)=(midTargetX, midScreenY)
    //   end:   tangent=PI (left)   → angle=PI/2, point=(cx, cy+R)=(midTargetX-R, midScreenY+R)
    arcA = {
      type: 'arc',
      cx: midTargetX - R, cy: midScreenY, radius: R,
      startAngle: 0, endAngle: Math.PI / 2, isCW: true,
      length: R * Math.PI / 2,
      rotationBlend: 0.6  // blend 60% toward downward-facing to reduce tilt
    };
    // Arc B (CCW): left → down
    //   tangent = angle - PI/2
    //   start: tangent=PI (left)   → angle=3PI/2, point=(cx, cy-R)=(midTargetX-R, midScreenY+R)
    //   end:   tangent=PI/2 (down) → angle=PI, point=(cx-R, cy)=(midTargetX-2R, midScreenY+2R)
    arcB = {
      type: 'arc',
      cx: midTargetX - R, cy: midScreenY + 2 * R, radius: R,
      startAngle: 3 * Math.PI / 2, endAngle: Math.PI, isCW: false,
      length: R * Math.PI / 2,
      rotationBlend: 0.6  // blend 60% toward downward-facing to reduce tilt
    };
  }
  const sCurveExitX = arcB.cx + arcB.radius * Math.cos(arcB.endAngle);
  const sCurveExitY = arcB.cy + arcB.radius * Math.sin(arcB.endAngle);

  // =====================
  // Segment 5: Straight descent from S-curve exit to final target
  // =====================
  const finalDx = finalTargetX - sCurveExitX;
  const finalDy = finalTargetY - sCurveExitY;
  const finalLength = Math.sqrt(finalDx * finalDx + finalDy * finalDy);
  const finalLine = {
    type: 'line',
    fromX: sCurveExitX, fromY: sCurveExitY,
    toX: finalTargetX, toY: finalTargetY,
    length: finalLength
  };

  // =====================
  // Segment 6: Bottom U-turn (semicircle, sweep = PI)
  // Starts facing down (PI/2), ends facing up (-PI/2)
  // =====================
  const ascentTargetX = enemy.targetX;
  const ascentTargetY = enemy.targetY;
  const bottomDir = (ascentTargetX >= finalTargetX) ? 1 : -1;

  let bottomArc;
  if (bottomDir === 1) {
    const cx = finalTargetX - R;
    const cy = finalTargetY;
    bottomArc = {
      type: 'arc', cx, cy, radius: R,
      startAngle: 0, endAngle: Math.PI, isCW: true,
      length: R * Math.PI
    };
  } else {
    const cx = finalTargetX + R;
    const cy = finalTargetY;
    bottomArc = {
      type: 'arc', cx, cy, radius: R,
      startAngle: Math.PI, endAngle: 0, isCW: false,
      length: R * Math.PI
    };
  }
  const bottomExitX = bottomArc.cx + bottomArc.radius * Math.cos(bottomArc.endAngle);
  const bottomExitY = bottomArc.cy + bottomArc.radius * Math.sin(bottomArc.endAngle);

  // =====================
  // Segment 7: Straight ascent
  // From bottom U-turn exit to formation position
  // =====================
  const ascentDx = ascentTargetX - bottomExitX;
  const ascentDy = ascentTargetY - bottomExitY;
  const ascentLength = Math.sqrt(ascentDx * ascentDx + ascentDy * ascentDy);
  const ascentLine = {
    type: 'line',
    fromX: bottomExitX, fromY: bottomExitY,
    toX: ascentTargetX, toY: ascentTargetY,
    length: ascentLength
  };

  const segments = [topArc, midLine, arcA, arcB, finalLine, bottomArc, ascentLine];
  const totalLength = segments.reduce((sum, s) => sum + s.length, 0);
  return { segments, totalLength };
}

/** Interpolate between two angles using the shortest angular path. */
function shortestAngleLerp(a, b, t) {
  let diff = b - a;
  while (diff >  Math.PI) diff -= 2 * Math.PI;
  while (diff < -Math.PI) diff += 2 * Math.PI;
  return a + diff * t;
}

/**
  * Evaluate position and rotation along a segment path at distance d from start.
  * Returns { x, y, rotation }.
  *
  * Rotation follows the movement tangent so the enemy faces its direction
  * of travel. A +PI/2 face-offset is applied because the enemy sprite's
  * "front" (eyes / antennae) points UP in local space (rotation = 0 means
  * the sprite faces up).  After the offset: tangent -PI/2 (up) gives
  * rotation 0 (upright); tangent +PI/2 (down) gives rotation PI (facing
  * down).
  *
  * A short blend zone at each segment boundary prevents the rotation from
  * "snapping" when the tangent of one segment doesn't perfectly match the
  * tangent of the next.
  *
  * On the final ascent segment, rotation smoothly blends back to 0 (upright)
  * as the enemy nears the formation grid.
  */
function evaluatePath(path, d) {
  let remaining = d;
  let prevSegment = null;
  const blendZone = 20; // pixels - smooth rotation over this distance at boundaries

  for (let i = 0; i < path.segments.length; i++) {
    const seg = path.segments[i];
    const isLastSegment = (i === path.segments.length - 1);

    if (remaining <= seg.length || isLastSegment) {
      const t = isLastSegment
        ? Math.min(remaining / seg.length, 1)
        : remaining / seg.length;

      let x, y, tangentRotation;

      if (seg.type === 'arc') {
        const angle = seg.startAngle + (seg.endAngle - seg.startAngle) * t;
        x = seg.cx + seg.radius * Math.cos(angle);
        y = seg.cy + seg.radius * Math.sin(angle);
        // Tangent direction:
        //   CW arc:  angle + PI/2
        //   CCW arc: angle - PI/2
        tangentRotation = seg.isCW ? (angle + Math.PI / 2) : (angle - Math.PI / 2);
      } else {
        // Line segment
        x = seg.fromX + (seg.toX - seg.fromX) * t;
        y = seg.fromY + (seg.toY - seg.fromY) * t;
        tangentRotation = Math.atan2(seg.toY - seg.fromY, seg.toX - seg.fromX);
      }

      // Add face-offset so the enemy sprite faces its direction of travel.
      // Sprite front points UP at rotation=0, so visualFacing = rotation - PI/2.
      // We want visualFacing == tangentRotation  =>  rotation = tangentRotation + PI/2.
      let rotation = tangentRotation + Math.PI / 2;

      // If this segment has a rotationBlend factor, blend toward downward-facing
      // to reduce aggressive tilting during mid-screen S-curves.
      // Downward-facing = tangent PI/2 => visual rotation = PI.
      if (seg.rotationBlend > 0) {
        const downwardRotation = Math.PI;
        let diff = downwardRotation - rotation;
        while (diff >  Math.PI) diff -= 2 * Math.PI;
        while (diff < -Math.PI) diff += 2 * Math.PI;
        rotation += diff * seg.rotationBlend;
      }

      // --- Blend at segment boundaries to prevent snapping ---
      if (prevSegment && remaining < blendZone) {
        // Tangent at the end of the previous segment
        let prevEndTangent;
        if (prevSegment.type === 'arc') {
          prevEndTangent = prevSegment.isCW
            ? (prevSegment.endAngle + Math.PI / 2)
            : (prevSegment.endAngle - Math.PI / 2);
        } else {
          prevEndTangent = Math.atan2(
            prevSegment.toY - prevSegment.fromY,
            prevSegment.toX - prevSegment.fromX
          );
        }
        let prevEndVisual = prevEndTangent + Math.PI / 2;
        // If the previous segment had a rotationBlend, apply it to the
        // previous-end visual rotation too, so the boundary blend starts
        // from the same blended value (prevents jitter at S-curve joins).
        if (prevSegment.rotationBlend > 0) {
          const downwardRotation = Math.PI;
          let diff = downwardRotation - prevEndVisual;
          while (diff >  Math.PI) diff -= 2 * Math.PI;
          while (diff < -Math.PI) diff += 2 * Math.PI;
          prevEndVisual += diff * prevSegment.rotationBlend;
        }
        const effectiveBlend = Math.min(blendZone, seg.length * 0.3);
        const blendT = Math.min(remaining / effectiveBlend, 1);
        rotation = shortestAngleLerp(prevEndVisual, rotation, blendT);
      }

      // On the last segment (ascent), blend rotation toward 0 (upright)
      // over the last 50% of the segment for a smooth lock-in.
      if (isLastSegment && t > 0.5) {
        const blendT = (t - 0.5) / 0.5; // 0..1
        let diff = -rotation;
        while (diff >  Math.PI) diff -= 2 * Math.PI;
        while (diff < -Math.PI) diff += 2 * Math.PI;
        rotation += diff * blendT;
      }

      return { x, y, rotation };
    }
    prevSegment = seg;
    remaining -= seg.length;
  }

  // Fallback: end of last segment, upright
  const last = path.segments[path.segments.length - 1];
  if (last.type === 'line') {
    return { x: last.toX, y: last.toY, rotation: 0 };
  }
  const endAngle = last.endAngle;
  const rot = last.isCW ? (endAngle + Math.PI / 2) : (endAngle - Math.PI / 2);
  return {
    x: last.cx + last.radius * Math.cos(endAngle),
    y: last.cy + last.radius * Math.sin(endAngle),
    rotation: rot + Math.PI / 2
  };
}

/**
 * Trigger an enemy to dive from formation.
 */
function tryTriggerDive(dt) {
  const formationEnemies = enemies.filter(e => e.alive && e.state === 'formation');
  if (formationEnemies.length === 0) return;

  const candidate = formationEnemies[Math.floor(Math.random() * formationEnemies.length)];
  if (!candidate) return;

  const diveChance = CONFIG.enemies.diveFrequency * (1 + waveManager.wave * 0.15);
  if (Math.random() < diveChance) {
    candidate.state = 'diving';
    candidate.diveStartTime = globalTime;
    candidate.diveStartX = candidate.x;
    candidate.diveStartY = candidate.y;
    candidate.diveDirection = (Math.random() < 0.5) ? -1 : 1;
    candidate.rotation = 0;
    candidate.divePath = buildDivePath(candidate);
  }
}

/**
 * Update diving enemies along their segment path.
 *
 * The enemy travels at a constant speed along the path. Total duration
 * is computed from the path length and a configured speed.
 */
function updateDivingEnemies() {
  const diveSpeed = CONFIG.enemies.dive.diveSpeed || 200; // pixels per second

  enemies.forEach(e => {
    if (e.state !== 'diving') return;

    const elapsed = (globalTime - e.diveStartTime); // seconds
    const dist = elapsed * diveSpeed;

    if (!e.divePath) return;

    const pos = evaluatePath(e.divePath, dist);
    e.x = pos.x;
    e.y = pos.y;
    e.rotation = pos.rotation;

    // Enemy shooting during dive
    e.shootTimer -= 1;
    if (e.shootTimer <= 0) {
      const chanceMap = CONFIG.enemies.shootChance;
      const diffMult = getDifficultyMultiplier(waveManager.wave);
      if (Math.random() < chanceMap[e.type] * 2 * diffMult) {
        const speed = CONFIG.bullets.enemySpeed * Math.min(diffMult, 2.0);
        bullets.push(createBullet(
          e.x, e.y + 10,
          0,
          speed,
          'enemy'
        ));
      }
      e.shootTimer = Math.max(10, 30 + Math.random() * 60 - waveManager.wave * 2);
    }

    // Path complete — transition back to formation
    if (dist >= e.divePath.totalLength) {
      e.state = 'formation';
      e.rotation = 0;
      e.x = e.targetX;
      e.y = e.targetY;
    }
  });
}

/**
 * No separate returning phase — the return is part of the dive path
 * (segments 3-4). This function is a no-op now.
 */
function updateReturningEnemies() {
  // Return is handled inline in updateDivingEnemies
}

// ================================================================
//  FORMATION ENEMY SHOOTING
// ================================================================
function updateFormationShooting() {
  const diffMult = getDifficultyMultiplier(waveManager.wave);
  enemies.forEach(e => {
    if (e.state !== 'formation' || !e.alive) return;
    e.shootTimer -= 1;
    if (e.shootTimer <= 0) {
      const chanceMap = CONFIG.enemies.shootChance;
      if (Math.random() < chanceMap[e.type] * diffMult) {
        bullets.push(createBullet(
          e.x, e.y + 10,
          0,
          CONFIG.bullets.enemySpeed * Math.min(diffMult, 2.0),
          'enemy'
        ));
      }
      e.shootTimer = Math.max(20, 60 + Math.random() * 120 - waveManager.wave * 3);
    }
  });
}

// ================================================================
//  COLLISION DETECTION
// ================================================================

/** Check circle-circle overlap */
function circleCollide(x1, y1, r1, x2, y2, r2) {
  const dx = x1 - x2;
  const dy = y1 - y2;
  return (dx * dx + dy * dy) <= (r1 + r2) * (r1 + r2);
}

/**
 * Check if a rotated rectangle (bullet) overlaps a circle (enemy/player).
 * Uses the separating axis theorem: project the circle onto the
 * rectangle's local axes and check overlap on each.
 *
 * rectX, rectY — center of the bullet rectangle
 * rectW, rectH — width and height (length and width) of the bullet
 * angle — rotation of the bullet in radians
 * circX, circY — center of the circle (enemy or player hit-area)
 * circR — radius of the circle
 */
function rectCircleCollide(rectX, rectY, rectW, rectH, angle, circX, circY, circR) {
  // Transform circle center into rectangle's local space
  const cos = Math.cos(-angle);
  const sin = Math.sin(-angle);
  const dx = circX - rectX;
  const dy = circY - rectY;
  const localX = dx * cos - dy * sin;
  const localY = dx * sin + dy * cos;

  // Find the closest point on the rectangle to the circle center
  const halfW = rectW / 2;
  const halfH = rectH / 2;
  const closestX = Math.max(-halfW, Math.min(halfW, localX));
  const closestY = Math.max(-halfH, Math.min(halfH, localY));

  // Distance from closest point to circle center
  const distX = localX - closestX;
  const distY = localY - closestY;
  return (distX * distX + distY * distY) <= circR * circR;
}

/** Player bounding circle */
function playerCircle() {
  return { x: player.x, y: player.y, r: 14 };
}

function checkCollisions() {
  const pc = playerCircle();

  // Player bullets vs enemies
  bullets.forEach(b => {
    if (b.type !== 'player' || !b.alive) return;
    enemies.forEach(e => {
      if (!e.alive) return;
      const enemyR = e.type === 'turret' ? 16 : e.type === 'zigzag' ? 14 : 12;
      if (rectCircleCollide(b.x, b.y, b.length, b.width, b.angle, e.x, e.y, enemyR)) {
        b.alive = false;
        e.hp -= 1;
        AudioSys.play('hit');
        if (e.hp <= 0) {
          e.alive = false;
          score += CONFIG.difficulty.scorePerKill * (e.type === 'turret' ? 3 : e.type === 'zigzag' ? 2 : 1);
          spawnParticles(e.x, e.y, 12);
        } else {
          // Flash effect: small particle burst
          spawnParticles(b.x, b.y, 3);
        }
      }
    });
  });

  // Enemy bullets vs player
  if (player.alive && player.invulnTimer <= 0) {
    bullets.forEach(b => {
      if (b.type !== 'enemy' || !b.alive) return;
      if (rectCircleCollide(b.x, b.y, b.length, b.width, b.angle, pc.x, pc.y, pc.r)) {
        b.alive = false;
        playerHit();
      }
    });
  }

  // Enemies vs player (body collision)
  if (player.alive && player.invulnTimer <= 0) {
    enemies.forEach(e => {
      if (!e.alive) return;
      const enemyR = e.type === 'turret' ? 16 : e.type === 'zigzag' ? 14 : 12;
      if (circleCollide(e.x, e.y, enemyR, pc.x, pc.y, pc.r)) {
        e.alive = false;
        spawnParticles(e.x, e.y, 12);
        playerHit();
      }
    });
  }
}

function playerHit() {
  player.lives -= 1;
  spawnParticles(player.x, player.y, 20);
  AudioSys.play('explosion');
  if (player.lives <= 0) {
    player.alive = false;
    setTimeout(() => {
      gameState = STATE.GAME_OVER;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('galaga_highscore', highScore);
      }
      AudioSys.play('gameover');
    }, 1000);
  } else {
    player.invulnTimer = CONFIG.player.respawnInvuln;
    player.x = W / 2;
    player.y = H - 80;
  }
}

// ================================================================
//  PARTICLE SYSTEM
// ================================================================
function spawnParticles(x, y, count) {
  if (!CONFIG.toggles.particles) return;
  const colors = CONFIG.colors.particles;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = CONFIG.particles.speedRange[0] + Math.random() * (CONFIG.particles.speedRange[1] -
CONFIG.particles.speedRange[0]);
    const color = colors[Math.floor(Math.random() * colors.length)];
    const life = CONFIG.particles.lifetime * (0.5 + Math.random() * 0.5);
    particles.push(createParticle(
      x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      color,
      life,
      2 + Math.random() * 3
    ));
  }
}

function updateParticles() {
  particles.forEach(p => {
    if (!p.alive) return;
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 1;
    if (p.life <= 0) p.alive = false;
  });
  particles = particles.filter(p => p.alive);
}

// ================================================================
//  DRAWING FUNCTIONS
// ================================================================

/** Initialize the starfield — called once at startup */
function initStars() {
  const sc = CONFIG.stars;
  stars = [];
  for (let i = 0; i < sc.count; i++) {
    const size = sc.minSize + Math.random() * (sc.maxSize - sc.minSize);
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: size,
      // Larger stars scroll faster (parallax depth effect)
      speed: sc.speed + Math.random() * sc.speedVariation * (size / sc.maxSize),
      // Each star gets its own flicker phase and frequency so they never sync
      phase: Math.random() * Math.PI * 2,
      flickerRate: sc.flickerSpeed + Math.random() * sc.flickerVariation,
      // Base brightness — larger stars tend to be brighter
      baseAlpha: sc.minAlpha + Math.random() * (sc.maxAlpha - sc.minAlpha)
    });
  }
}

/** Update star positions — scroll downward and wrap */
function updateStars() {
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    s.y += s.speed;
    s.phase += s.flickerRate;
    // Wrap star back to top when it leaves the bottom
    if (s.y > H + s.size) {
      s.y = -s.size;
      s.x = Math.random() * W;
    }
  }
}

/** Draw the starfield background */
function drawBackground() {
  c.fillStyle = CONFIG.colors.bg;
  c.fillRect(0, 0, W, H);

  // Draw each star as a small glowing dot with independent flicker
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    // Natural flicker: sine wave modulates alpha around baseAlpha
    const flicker = Math.sin(s.phase) * 0.5 + 0.5; // 0..1
    const alpha = s.baseAlpha * (0.4 + flicker * 0.6);
    c.save();
    c.globalAlpha = Math.max(0.05, Math.min(1, alpha));
    c.fillStyle = '#ffffff';
    c.shadowColor = '#ffffff';
    c.shadowBlur = s.size * 2;
    c.beginPath();
    c.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    c.fill();
    c.restore();
  }
}

/** Draw player — sleek upward triangle with engine glow */
function drawPlayer() {
  if (!player.alive) return;
  // Flicker during invulnerability
  if (player.invulnTimer > 0 && Math.floor(player.invulnTimer / 100) % 2 === 0) return;

  const px = player.x;
  const py = player.y;
  const color = CONFIG.colors.player;

  c.save();
  c.shadowColor = color;
  c.shadowBlur = 15;

  // Triangle body
  c.beginPath();
  c.moveTo(px, py - player.height / 2);
  c.lineTo(px - player.width / 2, py + player.height / 2);
  c.lineTo(px + player.width / 2, py + player.height / 2);
  c.closePath();
  c.strokeStyle = color;
  c.lineWidth = 2;
  c.stroke();

  // Inner fill with slight transparency
  c.fillStyle = color + '33';
  c.fill();

  // Engine glow — small ellipse at bottom
  c.shadowBlur = 25;
  c.shadowColor = color;
  c.beginPath();
  c.ellipse(px, py + player.height / 2 + 4, 4, 8 + Math.sin(globalTime * 10) * 3, 0, 0, Math.PI * 2);
  c.fillStyle = color + '66';
  c.fill();

  c.restore();
}

/** Draw enemies with distinct geometric silhouettes */
function drawEnemies() {
  enemies.forEach(e => {
    if (!e.alive) return;
    const color = e.type === 'basic' ? CONFIG.colors.enemyBasic
      : e.type === 'zigzag' ? CONFIG.colors.enemyZigzag
      : CONFIG.colors.enemyTurret;

    c.save();
    c.translate(e.x, e.y);
    c.rotate(e.rotation || 0);
    c.shadowColor = color;
    c.shadowBlur = 8;
    c.strokeStyle = color;
    c.lineWidth = 2;
    c.fillStyle = color + '22';

    // Wing flap animation — oscillates based on global time
    const wingFlap = Math.sin(globalTime * 8 + e.gridX * 0.5 + e.gridY * 0.3) * 0.3;

    if (e.type === 'basic') {
      // ---- Beetle / Firefly bug (Galaga-style) ----
      // Body — vertical oval
      c.beginPath();
      c.ellipse(0, 0, 8, 12, 0, 0, Math.PI * 2);
      c.fill();
      c.stroke();

      // Wing membrane — left
      c.beginPath();
      c.moveTo(-8, -4);
      c.quadraticCurveTo(-20, -8 + wingFlap * 12, -18, 4);
      c.quadraticCurveTo(-12, 2, -8, 4);
      c.fillStyle = color + '44';
      c.fill();
      c.stroke();

      // Wing membrane — right
      c.beginPath();
      c.moveTo(8, -4);
      c.quadraticCurveTo(20, -8 + wingFlap * 12, 18, 4);
      c.quadraticCurveTo(12, 2, 8, 4);
      c.fill();
      c.stroke();

      // Antennae
      c.beginPath();
      c.moveTo(-4, -12);
      c.quadraticCurveTo(-10, -22, -14, -20);
      c.moveTo(4, -12);
      c.quadraticCurveTo(10, -22, 14, -20);
      c.stroke();

      // Eyes — two bright dots
      c.fillStyle = '#fff';
      c.beginPath();
      c.arc(-4, -6, 2.5, 0, Math.PI * 2);
      c.arc(4, -6, 2.5, 0, Math.PI * 2);
      c.fill();

      // Legs — three pairs
      c.lineWidth = 1.5;
      const legSpread = 6;
      for (let i = -1; i <= 1; i++) {
        const ly = i * 5;
        c.beginPath();
        c.moveTo(-8, ly);
        c.lineTo(-8 - legSpread, ly - 3);
        c.lineTo(-8 - legSpread, ly + 3);
        c.moveTo(8, ly);
        c.lineTo(8 + legSpread, ly - 3);
        c.lineTo(8 + legSpread, ly + 3);
        c.stroke();
      }
      c.lineWidth = 2;

    } else if (e.type === 'zigzag') {
      // ---- Dragonfly / Moth bug ----
      // Body — elongated oval
      c.beginPath();
      c.ellipse(0, 0, 6, 14, 0, 0, Math.PI * 2);
      c.fill();
      c.stroke();

      // Wings — long and sweeping, left
      c.beginPath();
      c.moveTo(-6, -6);
      c.quadraticCurveTo(-28, -16 + wingFlap * 14, -26, -2);
      c.quadraticCurveTo(-16, 0, -6, 2);
      c.fillStyle = color + '55';
      c.fill();
      c.stroke();

      // Wings — long and sweeping, right
      c.beginPath();
      c.moveTo(6, -6);
      c.quadraticCurveTo(28, -16 + wingFlap * 14, 26, -2);
      c.quadraticCurveTo(16, 0, 6, 2);
      c.fill();
      c.stroke();

      // Lower wings — left
      c.beginPath();
      c.moveTo(-6, 2);
      c.quadraticCurveTo(-22, 6 + wingFlap * 10, -20, 14);
      c.quadraticCurveTo(-12, 10, -6, 6);
      c.fillStyle = color + '33';
      c.fill();
      c.stroke();

      // Lower wings — right
      c.beginPath();
      c.moveTo(6, 2);
      c.quadraticCurveTo(22, 6 + wingFlap * 10, 20, 14);
      c.quadraticCurveTo(12, 10, 6, 6);
      c.fill();
      c.stroke();

      // Antennae — curved
      c.beginPath();
      c.moveTo(-3, -14);
      c.quadraticCurveTo(-8, -24, -12, -22);
      c.moveTo(3, -14);
      c.quadraticCurveTo(8, -24, 12, -22);
      c.stroke();

      // Eyes — larger, more menacing
      c.fillStyle = '#fff';
      c.beginPath();
      c.arc(-3, -8, 3, 0, Math.PI * 2);
      c.arc(3, -8, 3, 0, Math.PI * 2);
      c.fill();

      // Legs — three pairs, thinner
      c.lineWidth = 1.5;
      for (let i = -1; i <= 1; i++) {
        const ly = i * 5;
        c.beginPath();
        c.moveTo(-6, ly);
        c.lineTo(-14, ly - 4);
        c.lineTo(-14, ly + 4);
        c.moveTo(6, ly);
        c.lineTo(14, ly - 4);
        c.lineTo(14, ly + 4);
        c.stroke();
      }
      c.lineWidth = 2;

    } else if (e.type === 'turret') {
      // ---- Armored beetle / Scarab bug ----
      // Body — wider, armored oval
      c.beginPath();
      c.ellipse(0, 0, 12, 14, 0, 0, Math.PI * 2);
      c.fill();
      c.stroke();

      // Shell ridge down the middle
      c.beginPath();
      c.moveTo(0, -14);
      c.lineTo(0, 14);
      c.stroke();

      // Wings — broad and shield-like, left
      c.beginPath();
      c.moveTo(-12, -6);
      c.quadraticCurveTo(-24, -12 + wingFlap * 8, -22, 6);
      c.quadraticCurveTo(-16, 4, -12, 6);
      c.fillStyle = color + '44';
      c.fill();
      c.stroke();

      // Wings — broad and shield-like, right
      c.beginPath();
      c.moveTo(12, -6);
      c.quadraticCurveTo(24, -12 + wingFlap * 8, 22, 6);
      c.quadraticCurveTo(16, 4, 12, 6);
      c.fill();
      c.stroke();

      // Mandibles — pincers at bottom
      c.beginPath();
      c.moveTo(-4, 14);
      c.quadraticCurveTo(-10, 22, -6, 24);
      c.moveTo(4, 14);
      c.quadraticCurveTo(10, 22, 6, 24);
      c.stroke();

      // Antennae — short and thick
      c.beginPath();
      c.moveTo(-5, -14);
      c.quadraticCurveTo(-12, -22, -8, -24);
      c.moveTo(5, -14);
      c.quadraticCurveTo(12, -22, 8, -24);
      c.stroke();

      // Eyes — glowing red
      c.fillStyle = '#fff';
      c.beginPath();
      c.arc(-5, -8, 3, 0, Math.PI * 2);
      c.arc(5, -8, 3, 0, Math.PI * 2);
      c.fill();

      // Legs — three pairs, thicker (armored)
      c.lineWidth = 2;
      for (let i = -1; i <= 1; i++) {
        const ly = i * 6;
        c.beginPath();
        c.moveTo(-12, ly);
        c.lineTo(-20, ly - 5);
        c.lineTo(-20, ly + 5);
        c.moveTo(12, ly);
        c.lineTo(20, ly - 5);
        c.lineTo(20, ly + 5);
        c.stroke();
      }
      c.lineWidth = 2;

      // HP indicator — small dots above head
      const dotR = 2;
      for (let i = 0; i < e.maxHp; i++) {
        c.beginPath();
        c.arc(-(e.maxHp - 1) * 4 + i * 8, -26, dotR, 0, Math.PI * 2);
        c.fillStyle = i < e.hp ? '#fff' : color + '44';
        c.fill();
      }
    }

    c.restore();
  });
}

/** Draw bullets as oriented line segments */
function drawBullets() {
  bullets.forEach(b => {
    if (!b.alive) return;
    c.save();
    const color = b.type === 'player' ? CONFIG.colors.playerBullet : CONFIG.colors.enemyBullet;
    c.shadowColor = color;
    c.shadowBlur = b.type === 'player' ? 10 : 8;
    c.fillStyle = color;
    c.translate(b.x, b.y);
    c.rotate(b.angle);
    // Draw the bullet as a thin rectangle centered at origin
    c.fillRect(-b.length / 2, -b.width / 2, b.length, b.width);
    c.restore();
  });
}

/** Draw particles */
function drawParticles() {
  if (!CONFIG.toggles.particles) return;
  particles.forEach(p => {
    if (!p.alive) return;
    const alpha = Math.max(0, p.life / p.maxLife);
    c.save();
    c.globalAlpha = alpha;
    c.fillStyle = p.color;
    c.shadowColor = p.color;
    c.shadowBlur = 4;
    const size = p.size * alpha;
    c.fillRect(p.x - size / 2, p.y - size / 2, size, size);
    c.restore();
  });
}

/** Draw HUD — score, lives, wave */
function drawHUD() {
  c.save();
  c.fillStyle = CONFIG.colors.accent;
  c.font = 'bold 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.textAlign = 'left';
  c.shadowColor = CONFIG.colors.accent;
  c.shadowBlur = 6;

  c.fillText(`SCORE ${score}`, 16, 30);
  c.textAlign = 'right';
  c.fillText(`WAVE ${waveManager.wave}`, W - 16, 30);

  if (CONFIG.toggles.highScore) {
    c.textAlign = 'center';
    c.fillText(`HI ${highScore}`, W / 2, 30);
  }

  // Lives as small triangles
  c.textAlign = 'left';
  for (let i = 0; i < player.lives; i++) {
    const lx = 16 + i * 22;
    const ly = 50;
    c.beginPath();
    c.moveTo(lx, ly - 6);
    c.lineTo(lx - 6, ly + 4);
    c.lineTo(lx + 6, ly + 4);
    c.closePath();
    c.strokeStyle = CONFIG.colors.accent;
    c.lineWidth = 1.5;
    c.stroke();
  }

  c.restore();
}

/** Draw MENU screen */
function drawMenu() {
  drawBackground();

  c.save();
  c.textAlign = 'center';

  // Title
  c.fillStyle = CONFIG.colors.accent;
  c.font = 'bold 48px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.shadowColor = CONFIG.colors.accent;
  c.shadowBlur = 20;
  c.fillText('GALAGA', W / 2, H * 0.3);

  c.shadowBlur = 0;
  c.font = '18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.fillStyle = '#888';
  c.fillText('Press SPACE or tap to start', W / 2, H * 0.5);

  if (CONFIG.toggles.highScore && highScore > 0) {
    c.fillStyle = CONFIG.colors.accent;
    c.font = '16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    c.fillText(`High Score: ${highScore}`, W / 2, H * 0.6);
  }

  // Controls info
  c.fillStyle = '#555';
  c.font = '13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.fillText('Arrow keys / WASD to move', W / 2, H * 0.75);
  c.fillText('Space to shoot  •  P to pause', W / 2, H * 0.8);

  c.restore();
}

/** Draw PAUSED overlay */
function drawPaused() {
  c.save();
  c.fillStyle = 'rgba(0,0,0,0.6)';
  c.fillRect(0, 0, W, H);

  c.textAlign = 'center';
  c.fillStyle = CONFIG.colors.accent;
  c.font = 'bold 36px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.shadowColor = CONFIG.colors.accent;
  c.shadowBlur = 15;
  c.fillText('PAUSED', W / 2, H / 2);

  c.shadowBlur = 0;
  c.font = '16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.fillStyle = '#888';
  c.fillText('Press P or ESC to resume', W / 2, H / 2 + 40);
  c.restore();
}

/** Draw GAME OVER screen */
function drawGameOver() {
  drawBackground();

  // Still draw remaining entities behind the overlay
  drawEnemies();
  drawParticles();
  drawBullets();
  drawPlayer();

  c.save();
  c.fillStyle = 'rgba(0,0,0,0.55)';
  c.fillRect(0, 0, W, H);

  c.textAlign = 'center';
  c.fillStyle = CONFIG.colors.enemyBasic;
  c.font = 'bold 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.shadowColor = CONFIG.colors.enemyBasic;
  c.shadowBlur = 20;
  c.fillText('GAME OVER', W / 2, H * 0.35);

  c.shadowBlur = 0;
  c.fillStyle = CONFIG.colors.accent;
  c.font = 'bold 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.fillText(`Score: ${score}`, W / 2, H * 0.5);

  if (score >= highScore && score > 0) {
    c.fillStyle = '#f5a623';
    c.font = 'bold 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    c.fillText('★ NEW HIGH SCORE ★', W / 2, H * 0.58);
  }

  if (CONFIG.toggles.highScore) {
    c.fillStyle = '#888';
    c.font = '16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    c.fillText(`High Score: ${highScore}`, W / 2, H * 0.66);
  }

  c.fillStyle = '#666';
  c.font = '16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  c.fillText('Press SPACE or tap to retry', W / 2, H * 0.8);
  c.restore();
}

// ================================================================
//  GAME INITIALIZATION
// ================================================================
function startGame() {
  gameState = STATE.PLAYING;
  score = 0;
  player = createPlayer();
  bullets = [];
  enemies = [];
  particles = [];
  waveManager = createWaveManager();
  spawnWave(waveManager);
  globalTime = 0;
  lastShotTime = 0;
}

// ================================================================
//  MAIN GAME LOOP — 60fps via requestAnimationFrame
// ================================================================
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  // Delta time in seconds (capped to avoid spiral of death)
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  if (gameState === STATE.MENU) {
    updateStars();
    drawMenu();
    return;
  }

  if (gameState === STATE.GAME_OVER) {
    updateStars();
    drawGameOver();
    updateParticles();
    return;
  }

  if (gameState === STATE.PAUSED) {
    updateStars();
    // Still render the game underneath
    drawBackground();
    drawEnemies();
    drawBullets();
    drawPlayer();
    drawParticles();
    drawHUD();
    drawPaused();
    return;
  }

  // ---- PLAYING STATE ----
  globalTime += dt;

  // --- Player movement ---
  if (player.alive) {
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= CONFIG.player.speed;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += CONFIG.player.speed;
    // Vertical movement disabled — player stays at fixed Y
    clampPlayer();

    // Invulnerability timer
    if (player.invulnTimer > 0) player.invulnTimer -= dt * 1000;

    // Shooting — limited by number of player bullets on screen (priority) and per-shot cooldown
    if (shootPressed) {
      const playerBulletCount = bullets.filter(b => b.alive && b.type === 'player').length;
      const timeSinceLastShot = globalTime * 1000 - lastShotTime;
      if (playerBulletCount < CONFIG.player.maxPlayerBullets && timeSinceLastShot >= CONFIG.player.shotCooldown) {
        bullets.push(createBullet(
          player.x,
          player.y - player.height / 2,
          0,
          -CONFIG.bullets.playerSpeed,
          'player'
        ));
        AudioSys.play('shoot');
        lastShotTime = globalTime * 1000;
      }
    }
  }

  // --- Update bullets ---
  bullets.forEach(b => {
    if (!b.alive) return;
    b.x += b.vx;
    b.y += b.vy;
    // Remove bullets that leave the canvas
    if (b.y < -20 || b.y > H + 20 || b.x < -20 || b.x > W + 20) {
      b.alive = false;
    }
  });
  bullets = bullets.filter(b => b.alive);

  // --- Enemy formation & diving ---
  updateFormationPositions();
  tryTriggerDive(dt);
  updateDivingEnemies();
  updateReturningEnemies();
  updateFormationShooting();

  // --- Wave progression ---
  const aliveEnemies = enemies.filter(e => e.alive).length;
  if (aliveEnemies === 0) {
    if (!waveManager.waveComplete) {
      waveManager.waveComplete = true;
      AudioSys.play('levelUp');
      waveManager.timer = 0;
    }
    // Pause between waves, then spawn the next one
    waveManager.timer++;
    if (waveManager.timer > 90) { // ~1.5 second pause between waves
      waveManager.wave++;
      if (waveManager.wave > CONFIG.difficulty.maxWave) {
        // Max wave reached — loop back with higher difficulty
        waveManager.wave = 1;
      }
      waveManager.waveComplete = false;
      waveManager.timer = 0;
      spawnWave(waveManager);
    }
  }

  // --- Collisions ---
  checkCollisions();

  // --- Stars ---
  updateStars();

  // --- Particles ---
  updateParticles();

  // --- Render ---
  drawBackground();
  drawEnemies();
  drawBullets();
  drawPlayer();
  drawParticles();
  drawHUD();
}

// ================================================================
//  BOOTSTRAP — Start the loop
// ================================================================
(function boot() {
  initStars();
  requestAnimationFrame(gameLoop);
})();
</script>
